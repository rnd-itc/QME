/* ===========================================================================
 * §8  PUBLIC FILL FORM (sections paging, validation, game mode)
 * ========================================================================== */

function PublicFillForm({ form, onSubmit, onClose, embedded=false, publicMode=false }) {
  const sections = (form.sections || [{ id:'_', name:'', desc:'', fields: form.fields || [] }]);
  const [respName, setRespName] = useState('');
  const [anonymous, setAnonymous] = useState(!!form.anonymous);
  const [answers, setAnswers] = useState({});
  const [errors, setErrors] = useState({});
  const [activeLang, setActiveLang] = useState(form.sourceLang || 'he');
  const [currentSecIdx, setCurrentSecIdx] = useState(0);
  const [submitted, setSubmitted] = useState(false);

  // Compute visible sections
  const visibleSections = sections.filter(s => isSectionVisible(s, answers));
  const currentSec = visibleSections[currentSecIdx] || visibleSections[0];

  const setAnswer = (fid, value) => {
    setAnswers(prev => ({ ...prev, [fid]: value }));
    setErrors(prev => ({ ...prev, [fid]: null }));
  };

  const validateSection = (sec) => {
    const errs = {};
    (sec.fields || []).forEach(f => {
      if (!isFieldVisible(f, answers)) return;
      const err = validateField(f, answers[f.id]);
      if (err) errs[f.id] = err;
    });
    setErrors(prev => ({ ...prev, ...errs }));
    return Object.keys(errs).length === 0;
  };

  const goNext = () => {
    if (!validateSection(currentSec)) return;
    if (currentSecIdx < visibleSections.length - 1) setCurrentSecIdx(currentSecIdx + 1);
    else handleSubmit();
  };
  const goBack = () => { if (currentSecIdx > 0) setCurrentSecIdx(currentSecIdx - 1); };

  const handleSubmit = () => {
    // validate all visible
    let ok = true;
    visibleSections.forEach(s => { if (!validateSection(s)) ok = false; });
    if (!ok) return;
    const response = {
      id: uuid('resp'),
      evalId: form.id,
      respName: anonymous ? null : (respName || 'אנונימי'),
      anonymous,
      submittedAt: new Date().toISOString(),
      language: activeLang,
      answers,
    };
    onSubmit(response);
    setSubmitted(true);
  };

  // Translation lookup
  const t = (key, fallback) => {
    const tr = (form.translations || {})[activeLang] || {};
    return tr[key] || fallback;
  };
  const tField = (fieldId, fallback) => {
    const tr = (form.translations || {})[activeLang] || {};
    return (tr.fields || {})[fieldId] || fallback;
  };

  const dir = LANGUAGES.find(l => l.code === activeLang)?.dir || 'rtl';

  if (submitted) {
    return (
      <div className={`p-10 text-center ${embedded ? '' : 'min-h-[60vh]'}`} dir={dir}>
        {form.logos && form.logos.length > 0 && (
          <div className="flex items-center justify-center gap-4 flex-wrap mb-6">
            {form.logos.map(l => <img key={l.id} src={l.dataUrl} alt={l.name} style={{ maxHeight: '50px', maxWidth: '120px', objectFit: 'contain' }} />)}
          </div>
        )}
        <div className="text-6xl mb-4 animate-bounce">🎉</div>
        <h2 className="font-display text-3xl font-bold mb-2">{(UI_STRINGS[activeLang] || UI_STRINGS.he).thankYou}</h2>
        <p className="text-[var(--ink-mute)] max-w-md mx-auto leading-relaxed">
          {(UI_STRINGS[activeLang] || UI_STRINGS.he).received}
        </p>
        {!publicMode && onClose && (
          <div className="mt-6">
            <Btn variant="primary" onClick={onClose}>סגור</Btn>
          </div>
        )}
      </div>
    );
  }

  return (
    <div dir={dir} className="overflow-y-auto">
      {/* Top logo banner */}
      {form.logos && form.logos.length > 0 && (
        <div className="flex items-center justify-center gap-6 flex-wrap py-5 px-6 mb-3 rounded-2xl"
             style={{
               background: 'linear-gradient(135deg, #fff8fb 0%, #faf0fd 50%, #ecf6f7 100%)',
               border: '1px solid rgba(91,48,145,0.08)',
               boxShadow: '0 1px 3px rgba(168,51,122,0.05), 0 8px 24px -6px rgba(91,48,145,0.08)',
             }}>
          {form.logos.map(l => (
            <img key={l.id} src={l.dataUrl} alt={l.name}
                 style={{ maxHeight: '70px', maxWidth: '180px', objectFit: 'contain' }} />
          ))}
        </div>
      )}

      {/* Header */}
      <div className="hero">
        <div className="relative z-10">
          <div className="flex items-start justify-between gap-4 mb-3">
            <div className="flex items-start gap-3">
              <span className="text-4xl">{form.icon || '📋'}</span>
              <div>
                <h1 className="hero-title">{t('title', form.title)}</h1>
                {(form.description || t('description', '')) && (
                  <p className="hero-sub mt-1 max-w-2xl">{t('description', form.description)}</p>
                )}
              </div>
            </div>
            {/* Language switcher */}
            <div className="flex gap-1 flex-wrap">
              {LANGUAGES.map(l => {
                const has = l.code === form.sourceLang || (form.translations || {})[l.code];
                if (!has) return null;
                return (
                  <button key={l.code} onClick={() => setActiveLang(l.code)} title={l.name}
                          className={`px-2 py-1 rounded text-xl transition ${activeLang === l.code ? 'bg-white/20 scale-110' : 'opacity-60 hover:opacity-100'}`}>
                    {l.flag}
                  </button>
                );
              })}
            </div>
          </div>
          {/* Section progress */}
          {visibleSections.length > 1 && (
            <div className="mt-4">
              <div className="flex items-center gap-2 mb-2">
                <div className="text-xs text-[var(--paper-warm)]/80">
                  {(UI_STRINGS[activeLang] || UI_STRINGS.he).sectionOf.replace('{n}', currentSecIdx + 1).replace('{t}', visibleSections.length)}
                </div>
                <div className="flex-1 h-1 bg-white/10 rounded overflow-hidden">
                  <div className="h-full bg-gradient-to-l from-[var(--gold)] to-[var(--gold-soft)]"
                       style={{ width: `${((currentSecIdx + 1) / visibleSections.length) * 100}%`, transition: 'width 400ms' }} />
                </div>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Body */}
      <div className="p-6 max-w-3xl mx-auto">
        {/* Name + anonymous on first section */}
        {currentSecIdx === 0 && !form.anonymous && (
          <div className="card-paper p-4 mb-5">
            <Field label={(UI_STRINGS[activeLang] || UI_STRINGS.he).name}>
              <input className="input" value={respName} onChange={e => setRespName(e.target.value)} disabled={anonymous} />
            </Field>
            <div className="mt-2">
              <Toggle checked={anonymous} onChange={setAnonymous} label={(UI_STRINGS[activeLang] || UI_STRINGS.he).anonToggle} />
            </div>
          </div>
        )}

        {/* Current section */}
        {currentSec && (
          <div className="reveal" key={currentSec.id}>
            {currentSec.name && (
              <div className="mb-5">
                <h2 className="font-display text-2xl font-bold text-[var(--ink)]">{
                  (() => {
                    const tr = (form.translations || {})[activeLang];
                    return (tr?.sections || {})[currentSec.id] || currentSec.name;
                  })()
                }</h2>
                {(() => {
                    const tr = (form.translations || {})[activeLang];
                    const descText = (tr?.sectionDescs || {})[currentSec.id] || currentSec.desc;
                    return descText ? <p className="text-sm text-[var(--ink-mute)] mt-1 leading-relaxed">{descText}</p> : null;
                  })()}
              </div>
            )}

            <div className="space-y-5">
              {(currentSec.fields || []).map(f => {
                if (!isFieldVisible(f, answers)) return null;
                return (
                  <div key={f.id} className="card-paper p-5 reveal">
                    <FillFieldRenderer
                      field={f}
                      value={answers[f.id]}
                      onChange={(v) => setAnswer(f.id, v)}
                      error={errors[f.id]}
                      labelOverride={tField(f.id, f.label)}
                      lang={activeLang}
                    />
                  </div>
                );
              })}
            </div>

            {/* Navigation */}
            <div className="flex items-center justify-between mt-6 gap-3">
              <Btn variant="ghost" disabled={currentSecIdx === 0} onClick={goBack}>{(UI_STRINGS[activeLang] || UI_STRINGS.he).back}</Btn>
              {currentSecIdx < visibleSections.length - 1 ? (
                <Btn variant="primary" onClick={goNext}>{(UI_STRINGS[activeLang] || UI_STRINGS.he).next}</Btn>
              ) : (
                <Btn variant="gold" icon="📤" onClick={goNext}>{(UI_STRINGS[activeLang] || UI_STRINGS.he).submit}</Btn>
              )}
            </div>
          </div>
        )}

        {/* Footer logos (small) */}
        {form.logos && form.logos.length > 0 && (
          <div className="mt-8 pt-5 border-t border-[var(--ink)]/10">
            <div className="flex items-center justify-center gap-4 flex-wrap opacity-75">
              {form.logos.map(l => (
                <img key={l.id} src={l.dataUrl} alt={l.name}
                     style={{ maxHeight: '32px', maxWidth: '90px', objectFit: 'contain' }} />
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function FillFieldRenderer({ field, value, onChange, error, labelOverride, lang }) {
  const label = labelOverride || field.label;
  return (
    <div>
      <div className="mb-2">
        <label className="text-base font-medium text-[var(--ink)] leading-snug">
          {label} {field.required && <span className="text-[var(--red)]">*</span>}
        </label>
        {field.helperText && <div className="text-xs text-[var(--ink-mute)] mt-1">{field.helperText}</div>}
      </div>
      <FillInput field={field} value={value} onChange={onChange} />
      {error && <div className="text-xs text-[var(--red)] mt-2 flex items-center gap-1">⚠ {error}</div>}
    </div>
  );
}

function FillInput({ field, value, onChange }) {
  // TEXT
  if (field.type === 'text') {
    const cfg = field.textConfig || {};
    if (cfg.multiline) {
      return (
        <div>
          <textarea className="textarea" rows={cfg.rows || 3} value={value || ''} onChange={e => onChange(e.target.value)} />
          {cfg.showCounter && <div className="text-xs text-[var(--ink-mute)] mt-1 text-left">{(value || '').length}{cfg.maxLength ? ` / ${cfg.maxLength}` : ''} תווים</div>}
        </div>
      );
    }
    return <input className="input" value={value || ''} onChange={e => onChange(e.target.value)}
                  type={cfg.format === 'email' ? 'email' : cfg.format === 'url' ? 'url' : cfg.format === 'phone' ? 'tel' : 'text'} />;
  }
  // NUMBER
  if (field.type === 'number') {
    const cfg = field.numberConfig || {};
    if (cfg.format === 'fraction') {
      return <input className="input" value={value || ''} placeholder="לדוגמה: 3/4" onChange={e => onChange(e.target.value)} />;
    }
    if (cfg.showSlider && cfg.min !== undefined && cfg.max !== undefined) {
      return (
        <div>
          <input type="range" className="slider-3d w-full" min={cfg.min} max={cfg.max} step={cfg.format === 'integer' ? 1 : 0.1}
                 value={value || cfg.min} onChange={e => onChange(parseFloat(e.target.value))} />
          <div className="text-center font-display text-xl font-bold mt-1">{value || cfg.min}{cfg.format === 'percent' ? '%' : ''}</div>
        </div>
      );
    }
    return <input className="input" type={cfg.format === 'integer' ? 'number' : 'text'}
                  value={value || ''} placeholder={cfg.format === 'percent' ? 'אחוזים' : ''}
                  onChange={e => onChange(e.target.value)} />;
  }
  // DATE
  if (field.type === 'date') {
    const cfg = field.dateConfig || {};
    const inputType = cfg.format === 'datetime' ? 'datetime-local' : cfg.format === 'time' ? 'time' : cfg.format === 'month' ? 'month' : 'date';
    return <input className="input" type={inputType} value={value || ''}
                  min={cfg.min} max={cfg.max}
                  onChange={e => onChange(e.target.value)} />;
  }
  // RATING
  if (field.type === 'rating') {
    const max = field.max || 10;
    const arr = Array.from({length: max}, (_,i) => i + 1);
    if (field.ratingStyle === 'numbers') {
      return (
        <div className="flex gap-1 flex-wrap">
          {arr.map(n => (
            <button key={n} onClick={() => onChange(n)}
                    className={`w-10 h-10 rounded-full border font-semibold transition
                      ${(value || 0) >= n ? 'bg-[var(--ink)] border-[var(--ink)] text-[var(--paper)]' : 'bg-white border-[var(--ink)]/15 text-[var(--ink-mute)] hover:border-[var(--gold)]'}`}>
              {n}
            </button>
          ))}
        </div>
      );
    }
    const icon = field.ratingStyle === 'hearts' ? '♥' : '★';
    return (
      <div className="flex gap-1 flex-row-reverse justify-end">
        {arr.slice().reverse().map(n => (
          <span key={n} className={`star ${(value || 0) >= n ? 'star-filled' : 'star-empty'}`} onClick={() => onChange(n)}>{icon}</span>
        ))}
        <span className="font-display font-bold text-xl text-[var(--ink-mute)] ml-3 self-center">{value || '—'}/{max}</span>
      </div>
    );
  }
  // LIKERT
  if (field.type === 'likert') {
    const max = field.max || 5;
    const labels = (field.likertLabels || '').split('|').map(s => s.trim());
    return (
      <div>
        <div className="flex">
          {Array.from({length: max}, (_,i) => i + 1).map(n => (
            <div key={n} className={`likert-pill ${value === n ? 'likert-pill-active' : ''}`} onClick={() => onChange(n)}>
              {n}
            </div>
          ))}
        </div>
        {labels.length === 2 && (
          <div className="flex justify-between text-xs text-[var(--ink-mute)] mt-1.5 px-1">
            <span>{labels[0]}</span><span>{labels[1]}</span>
          </div>
        )}
      </div>
    );
  }
  // SINGLE
  if (field.type === 'single') {
    return (
      <div className="space-y-1.5">
        {(field.options || []).map((opt, i) => (
          <label key={i} className={`flex items-center gap-3 p-2.5 rounded-lg border cursor-pointer transition ${value === opt ? 'bg-white border-[var(--gold)] shadow-sm' : 'bg-[var(--paper-warm)]/40 border-[var(--ink)]/10 hover:border-[var(--ink)]/20'}`}>
            <span className={`w-5 h-5 rounded-full border-2 flex-shrink-0 ${value === opt ? 'border-[var(--gold-deep)] bg-[var(--gold)]' : 'border-[var(--ink-mute)]'}`}>
              {value === opt && <span className="block w-full h-full rounded-full bg-white" style={{transform:'scale(0.4)'}}></span>}
            </span>
            <span className="text-sm">{opt}</span>
            <input type="radio" name={field.id} value={opt} checked={value === opt} onChange={() => onChange(opt)} className="sr-only" />
          </label>
        ))}
      </div>
    );
  }
  // MULTI
  if (field.type === 'multi') {
    const arr = Array.isArray(value) ? value : [];
    const toggle = (opt) => {
      const next = arr.includes(opt) ? arr.filter(x => x !== opt) : [...arr, opt];
      onChange(next);
    };
    return (
      <div className="space-y-1.5">
        {(field.options || []).map((opt, i) => (
          <label key={i} className={`flex items-center gap-3 p-2.5 rounded-lg border cursor-pointer transition ${arr.includes(opt) ? 'bg-white border-[var(--gold)] shadow-sm' : 'bg-[var(--paper-warm)]/40 border-[var(--ink)]/10 hover:border-[var(--ink)]/20'}`}>
            <span className={`w-5 h-5 rounded border-2 flex-shrink-0 flex items-center justify-center ${arr.includes(opt) ? 'border-[var(--gold-deep)] bg-[var(--gold)] text-white' : 'border-[var(--ink-mute)]'}`}>
              {arr.includes(opt) && '✓'}
            </span>
            <span className="text-sm">{opt}</span>
            <input type="checkbox" checked={arr.includes(opt)} onChange={() => toggle(opt)} className="sr-only" />
          </label>
        ))}
      </div>
    );
  }
  // YES/NO
  if (field.type === 'yesno') {
    return (
      <div className="flex gap-3">
        {['כן','לא'].map(opt => (
          <button key={opt} onClick={() => onChange(opt)}
                  className={`flex-1 py-3 rounded-lg border font-semibold transition ${value === opt
                    ? (opt === 'כן' ? 'bg-[var(--green)] border-[var(--green)] text-white' : 'bg-[var(--red)] border-[var(--red)] text-white')
                    : 'bg-white border-[var(--ink)]/15 text-[var(--ink-mute)] hover:border-[var(--ink)]'}`}>
            {opt === 'כן' ? '✓ כן' : '✕ לא'}
          </button>
        ))}
      </div>
    );
  }
  // RANKING
  if (field.type === 'ranking') {
    const order = Array.isArray(value) ? value : (field.options || []);
    const move = (idx, dir) => {
      const next = [...order];
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= next.length) return;
      [next[idx], next[newIdx]] = [next[newIdx], next[idx]];
      onChange(next);
    };
    return (
      <div className="space-y-1.5">
        {order.map((opt, i) => (
          <div key={i} className="flex items-center gap-3 p-2.5 rounded-lg border border-[var(--ink)]/10 bg-white">
            <span className="font-display font-bold w-7 h-7 rounded-full bg-[var(--gold)] text-white flex items-center justify-center text-sm">{i+1}</span>
            <span className="flex-1 text-sm">{opt}</span>
            <button onClick={() => move(i, -1)} className="text-[var(--ink-mute)] hover:text-[var(--ink)] w-6">▲</button>
            <button onClick={() => move(i, 1)}  className="text-[var(--ink-mute)] hover:text-[var(--ink)] w-6">▼</button>
          </div>
        ))}
      </div>
    );
  }
  // SLIDER
  if (field.type === 'slider') {
    const cfg = field.sliderConfig || { min: 0, max: 10, step: 1 };
    return (
      <div>
        <input type="range" className="slider-3d w-full" min={cfg.min} max={cfg.max} step={cfg.step}
               value={value ?? cfg.min} onChange={e => onChange(parseFloat(e.target.value))} />
        <div className="flex items-center justify-between text-xs text-[var(--ink-mute)] mt-1.5">
          <span>{cfg.leftLabel || cfg.min}</span>
          <span className="font-display font-bold text-2xl text-[var(--ink)]">{value ?? cfg.min}</span>
          <span>{cfg.rightLabel || cfg.max}</span>
        </div>
      </div>
    );
  }
  // IMAGE
  if (field.type === 'image') {
    return (
      <div className="grid grid-cols-5 gap-2">
        {(field.options || []).map((opt, i) => (
          <button key={i} onClick={() => onChange(opt)}
                  className={`p-4 rounded-lg border-2 text-center transition ${value === opt ? 'border-[var(--gold)] bg-white scale-105' : 'border-[var(--ink)]/10 bg-white/60 hover:border-[var(--ink)]/30'}`}>
            <div className="text-3xl">{opt.match(/^\p{Emoji}/u)?.[0] || '🖼️'}</div>
            <div className="text-xs mt-1">{opt.replace(/^\p{Emoji}\s*/u, '')}</div>
          </button>
        ))}
      </div>
    );
  }
  return <div className="text-sm text-[var(--ink-mute)] italic">סוג שדה לא נתמך</div>;
}

// §10 DASHBOARD (9 tabs: Summary / Quant / Charts / Qualitative / Compare / Crosstab / Trends / Respondents / Export)
// ═══════════════════════════════════════════════════════════════════
const CHART_COLORS = ['#0d6e7a', '#a8337a', '#5b3091', '#2a8a96', '#d96394', '#7a4dad', '#074d56', '#7d2058'];

function EvalDashboard({ form, responses, series, evals, allResponses, onBack, onExport }) {
  const [activeTab, setActiveTab] = useState('summary');
  const allFields = flattenFields(form);
  const numericFields = allFields.filter(f => ['number','rating','likert','slider'].includes(f.type));
  const categoricalFields = allFields.filter(f => ['single','yesno','image'].includes(f.type));
  const multiFields = allFields.filter(f => f.type === 'multi');
  const textFields = allFields.filter(f => f.type === 'text');

  const responseCount = responses.length;

  // Determine if this form belongs to any series
  const formSeriesLinks = (series || []).filter(s =>
    (s.items || []).some(it => it.formId === form.id)
  );
  const hasSeriesLink = formSeriesLinks.length > 0;

  const tabs = [
    { id: 'summary', label: '📊 סקירה', },
    { id: 'quant', label: '📈 כמותי' },
    { id: 'charts', label: '📉 גרפים' },
    { id: 'qualitative', label: '💬 איכותני' },
    { id: 'compare', label: '⚖️ השוואות' },
    { id: 'crosstab', label: '🔀 הצלבות' },
    { id: 'trends', label: '📅 מגמות' },
    { id: 'respondents', label: '👥 משיבים' },
    ...(hasSeriesLink ? [{ id: 'serieslink', label: '🔗 קישור סדרה' }] : []),
    { id: 'export', label: '⬇️ ייצוא' },
  ];

  return (
    <div>
      <div className="hero p-7 mb-6">
        <div className="hero-content">
          <div className="flex items-start justify-between gap-4">
            <div>
              <div className="text-xs font-display tracking-[0.2em] uppercase text-[var(--ink-mute)] mb-2">לוח ניתוח · {form.title}</div>
              <h2 className="font-display text-4xl font-bold mb-1">{form.icon || '📊'} {form.title}</h2>
              <p className="text-[var(--ink-mute)] font-display">קריאה צמודה של הנתונים — לא רק מספרים, אלא מה הם אומרים.</p>
            </div>
            <Btn variant="ghost" onClick={onBack}>← חזרה</Btn>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mt-5">
            <div className="kpi"><div className="kpi-num">{responseCount}</div><div className="kpi-lbl">מענים שהתקבלו</div></div>
            <div className="kpi"><div className="kpi-num">{allFields.length}</div><div className="kpi-lbl">שאלות בשאלון</div></div>
            <div className="kpi"><div className="kpi-num">{(form.sections || []).length}</div><div className="kpi-lbl">סעיפים</div></div>
            <div className="kpi"><div className="kpi-num">{form.isActive ? '✓' : '⏸'}</div><div className="kpi-lbl">{form.isActive ? 'פעיל' : 'מושהה'}</div></div>
          </div>
        </div>
      </div>

      <div className="flex flex-wrap gap-1.5 mb-5 p-1.5 card-paper">
        {tabs.map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)}
                  className={`tab ${activeTab === t.id ? 'tab-active' : ''}`}>{t.label}</button>
        ))}
      </div>

      {responseCount === 0 && (
        <div className="banner-info">
          <div className="text-2xl">📭</div>
          <div>
            <div className="font-display font-bold mb-1">עוד אין מענים</div>
            <div className="text-sm">הניתוח יקרום עור וגידים ברגע שהמשיבים הראשונים יענו. שתפי את הקישור הציבורי כדי להתחיל.</div>
          </div>
        </div>
      )}

      {activeTab === 'summary' && responseCount > 0 && <DashSummary form={form} responses={responses} allFields={allFields} />}
      {activeTab === 'quant' && responseCount > 0 && <DashQuantitative numericFields={numericFields} responses={responses} />}
      {activeTab === 'charts' && responseCount > 0 && <DashCharts categoricalFields={categoricalFields} multiFields={multiFields} numericFields={numericFields} responses={responses} />}
      {activeTab === 'qualitative' && responseCount > 0 && <DashQualitative textFields={textFields} responses={responses} />}
      {activeTab === 'compare' && responseCount > 0 && <DashCompare numericFields={numericFields} categoricalFields={categoricalFields} responses={responses} />}
      {activeTab === 'crosstab' && responseCount > 0 && <DashCrosstab categoricalFields={categoricalFields} responses={responses} />}
      {activeTab === 'trends' && responseCount > 0 && <DashTrends responses={responses} />}
      {activeTab === 'respondents' && responseCount > 0 && <DashRespondents form={form} responses={responses} allFields={allFields} />}
      {activeTab === 'serieslink' && hasSeriesLink && <DashSeriesLink form={form} series={formSeriesLinks} evals={evals || []} allResponses={allResponses || []} />}
      {activeTab === 'export' && <DashExport form={form} responses={responses} onExport={onExport} />}
    </div>
  );
}

function DashSummary({ form, responses, allFields }) {
  return (
    <div className="space-y-4">
      <div className="card-paper p-6">
        <h3 className="font-display text-2xl font-bold mb-4">תקציר השאלון</h3>
        <div className="space-y-3">
          {allFields.slice(0, 12).map(f => {
            const values = responses.map(r => r.answers?.[f.id]).filter(v => v !== undefined && v !== null && v !== '');
            const answerRate = responses.length ? (values.length / responses.length * 100).toFixed(0) : 0;
            return (
              <div key={f.id} className="border-b border-[var(--ink)]/10 pb-3 last:border-0">
                <div className="flex items-center justify-between mb-1">
                  <div className="font-display font-bold text-sm">{f.label}</div>
                  <div className="text-xs text-[var(--ink-mute)]">{values.length}/{responses.length} השיבו · {answerRate}%</div>
                </div>
                {(['number','rating','likert','slider'].includes(f.type)) && values.length > 0 && (
                  <div className="text-xs text-[var(--ink-mute)]">ממוצע: <b className="text-[var(--ink)]">{mean(values).toFixed(2)}</b> · חציון: {median(values)} · ס״ת: {std(values).toFixed(2)}</div>
                )}
                {(['single','yesno','image'].includes(f.type)) && values.length > 0 && (
                  <div className="flex flex-wrap gap-1.5 mt-1">
                    {Object.entries(values.reduce((a,v) => (a[v]=(a[v]||0)+1, a), {})).map(([k,c]) => (
                      <span key={k} className="text-xs px-2 py-0.5 rounded-full bg-[var(--ink)]/5">{k}: <b>{c}</b></span>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function DashQuantitative({ numericFields, responses }) {
  if (numericFields.length === 0) return <div className="banner-info"><div>אין שאלות כמותיות בשאלון.</div></div>;
  return (
    <div className="card-paper p-6">
      <h3 className="font-display text-2xl font-bold mb-4">ניתוח כמותי</h3>
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="border-b-2 border-[var(--ink)]/20">
              <th className="text-right py-2 px-2 font-display">שאלה</th>
              <th className="py-2 px-2 font-display">n</th>
              <th className="py-2 px-2 font-display">ממוצע</th>
              <th className="py-2 px-2 font-display">חציון</th>
              <th className="py-2 px-2 font-display">ס״ת</th>
              <th className="py-2 px-2 font-display">מינ׳</th>
              <th className="py-2 px-2 font-display">מקס׳</th>
              <th className="py-2 px-2 font-display">95% CI</th>
            </tr>
          </thead>
          <tbody>
            {numericFields.map(f => {
              const values = responses.map(r => r.answers?.[f.id]).filter(v => typeof v === 'number' && !isNaN(v));
              if (values.length === 0) return null;
              const m = mean(values), s = std(values), n = values.length;
              const ci = 1.96 * s / Math.sqrt(n);
              return (
                <tr key={f.id} className="border-b border-[var(--ink)]/10 hover:bg-[var(--ink)]/3">
                  <td className="py-2 px-2 font-medium">{f.label}</td>
                  <td className="py-2 px-2 text-center mono text-xs">{n}</td>
                  <td className="py-2 px-2 text-center mono text-xs"><b>{m.toFixed(2)}</b></td>
                  <td className="py-2 px-2 text-center mono text-xs">{median(values).toFixed(1)}</td>
                  <td className="py-2 px-2 text-center mono text-xs">{s.toFixed(2)}</td>
                  <td className="py-2 px-2 text-center mono text-xs">{min(values)}</td>
                  <td className="py-2 px-2 text-center mono text-xs">{max(values)}</td>
                  <td className="py-2 px-2 text-center mono text-xs">[{(m-ci).toFixed(2)}, {(m+ci).toFixed(2)}]</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Inline SVG bar chart (no external dependency) ──────────────────────────
function SvgBarChart({ data }) {
  if (!data || data.length === 0) return null;
  const W = 460, H = 200, PAD = { top: 10, right: 10, bottom: 40, left: 36 };
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top - PAD.bottom;
  const maxVal = Math.max(...data.map(d => d.value), 1);
  const barW = Math.max(8, Math.floor(chartW / data.length) - 6);
  const step = Math.ceil(maxVal / 4);
  const gridLines = [step, step*2, step*3, step*4].filter(v => v <= maxVal + step);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', direction: 'ltr' }}>
      {/* grid lines */}
      {gridLines.map(v => {
        const y = PAD.top + chartH - (v / maxVal) * chartH;
        return (
          <g key={v}>
            <line x1={PAD.left} x2={PAD.left + chartW} y1={y} y2={y} stroke="#1f193318" strokeDasharray="3 3" />
            <text x={PAD.left - 4} y={y + 4} textAnchor="end" fontSize="10" fill="#6c6582">{v}</text>
          </g>
        );
      })}
      {/* bars */}
      {data.map((d, i) => {
        const x = PAD.left + (i / data.length) * chartW + (chartW / data.length - barW) / 2;
        const barH = Math.max(2, (d.value / maxVal) * chartH);
        const y = PAD.top + chartH - barH;
        const label = String(d.name).length > 8 ? String(d.name).slice(0, 7) + '…' : String(d.name);
        return (
          <g key={i}>
            <rect x={x} y={y} width={barW} height={barH} rx="4" fill={CHART_COLORS[i % CHART_COLORS.length]} opacity="0.85" />
            <text x={x + barW / 2} y={y - 3} textAnchor="middle" fontSize="10" fill="#1f1933" fontWeight="bold">{d.value}</text>
            <text x={x + barW / 2} y={PAD.top + chartH + 14} textAnchor="middle" fontSize="10" fill="#6c6582">{label}</text>
          </g>
        );
      })}
      {/* axes */}
      <line x1={PAD.left} x2={PAD.left} y1={PAD.top} y2={PAD.top + chartH} stroke="#1f193340" />
      <line x1={PAD.left} x2={PAD.left + chartW} y1={PAD.top + chartH} y2={PAD.top + chartH} stroke="#1f193340" />
    </svg>
  );
}

function SvgPieChart({ data }) {
  if (!data || data.length === 0) return null;
  const total = data.reduce((s, d) => s + d.value, 0);
  if (total === 0) return null;
  const cx = 110, cy = 100, r = 80;
  let angle = -Math.PI / 2;
  const slices = data.map((d, i) => {
    const sweep = (d.value / total) * 2 * Math.PI;
    const x1 = cx + r * Math.cos(angle), y1 = cy + r * Math.sin(angle);
    angle += sweep;
    const x2 = cx + r * Math.cos(angle), y2 = cy + r * Math.sin(angle);
    const large = sweep > Math.PI ? 1 : 0;
    const midAngle = angle - sweep / 2;
    return { x1, y1, x2, y2, large, color: CHART_COLORS[i % CHART_COLORS.length], pct: Math.round(d.value / total * 100), name: d.name, midAngle };
  });
  return (
    <svg viewBox="0 0 340 200" style={{ width: '100%', height: 'auto', direction: 'ltr' }}>
      {slices.map((s, i) => (
        <path key={i} d={`M${cx},${cy} L${s.x1},${s.y1} A${r},${r} 0 ${s.large},1 ${s.x2},${s.y2} Z`} fill={s.color} opacity="0.85" stroke="#fff" strokeWidth="1.5" />
      ))}
      {/* legend */}
      {data.map((d, i) => (
        <g key={i} transform={`translate(210, ${18 + i * 22})`}>
          <rect width="12" height="12" rx="3" fill={CHART_COLORS[i % CHART_COLORS.length]} opacity="0.85" />
          <text x="16" y="10" fontSize="11" fill="#1f1933">{String(d.name).slice(0, 16)} — {slices[i].pct}%</text>
        </g>
      ))}
    </svg>
  );
}

function DashCharts({ categoricalFields, multiFields, numericFields, responses }) {
  const [chartType, setChartType] = useState('bar');
  const allChartable = [...categoricalFields, ...multiFields, ...numericFields];
  if (allChartable.length === 0) return <div className="banner-info"><div>אין שאלות הניתנות להמחשה גרפית.</div></div>;

  const charts = allChartable.map(f => {
    let data = [];
    if (['single','yesno','image'].includes(f.type)) {
      const counts = responses.map(r => r.answers?.[f.id]).filter(Boolean).reduce((a,v) => (a[v]=(a[v]||0)+1, a), {});
      data = Object.entries(counts).map(([name,value]) => ({ name, value }));
    } else if (f.type === 'multi') {
      const counts = {};
      responses.forEach(r => (r.answers?.[f.id] || []).forEach(v => counts[v] = (counts[v]||0)+1));
      data = Object.entries(counts).map(([name,value]) => ({ name, value }));
    } else {
      const counts = responses.map(r => r.answers?.[f.id]).filter(v => typeof v === 'number').reduce((a,v) => (a[v]=(a[v]||0)+1, a), {});
      data = Object.entries(counts).map(([name,value]) => ({ name: String(name), value })).sort((a,b) => parseFloat(a.name) - parseFloat(b.name));

  }).filter(c => c.data.length > 0);

  if (charts.length === 0) return <div className="banner-info"><div>אין עדיין נתונים להמחשה.</div></div>;

  return (
    <div className="space-y-4">
      <div className="flex items-center gap-2 mb-3">
        <span className="font-display font-bold text-sm">סוג הצגה:</span>
        <button onClick={() => setChartType('bar')} className={`tab text-sm ${chartType==='bar'?'tab-active':''}`}>📊 עמודות</button>
        <button onClick={() => setChartType('pie')} className={`tab text-sm ${chartType==='pie'?'tab-active':''}`}>🥧 עוגה</button>
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        {charts.map(({ field, data }) => (
          <div key={field.id} className="card-paper p-5">
            <h4 className="font-display font-bold mb-3 text-sm">{field.label}</h4>
            {chartType === 'bar' ? <SvgBarChart data={data} /> : <SvgPieChart data={data} />}
          </div>
        ))}
      </div>
    </div>
  );
}

function DashCompare({ numericFields, categoricalFields, responses }) {
  const [groupField, setGroupField] = useState(categoricalFields[0]?.id || '');
  const [valueField, setValueField] = useState(numericFields[0]?.id || '');
  if (numericFields.length === 0 || categoricalFields.length === 0) return <div className="banner-info"><div>נדרשת שאלת קבוצה (קטגוריה) ושאלת ערך (מספר) כדי להשוות.</div></div>;
  const groups = {};
  responses.forEach(r => {
    const g = r.answers?.[groupField];
    const v = r.answers?.[valueField];
    if (g && typeof v === 'number') (groups[g] = groups[g] || []).push(v);
  });
  const groupStats = Object.entries(groups).map(([k,vs]) => ({ name: k, n: vs.length, mean: mean(vs), std: std(vs) }));
  // Welch's t-test for first two groups
  let tStat = null, pApprox = null;
  if (groupStats.length >= 2) {
    const [a,b] = groupStats;
    const seA = a.std*a.std / a.n, seB = b.std*b.std / b.n;
    tStat = (a.mean - b.mean) / Math.sqrt(seA + seB);
    pApprox = 2 * (1 - 0.5 * (1 + Math.tanh(Math.abs(tStat) * 0.7978)));
  }
  return (
    <div className="card-paper p-6 space-y-4">
      <h3 className="font-display text-2xl font-bold">השוואה בין קבוצות</h3>
      <div className="grid grid-cols-2 gap-3">
        <Field label="קבוצה (מחלקת)"><select className="input-ink" value={groupField} onChange={e => setGroupField(e.target.value)}>{categoricalFields.map(f => <option key={f.id} value={f.id}>{f.label}</option>)}</select></Field>
        <Field label="ערך נמדד"><select className="input-ink" value={valueField} onChange={e => setValueField(e.target.value)}>{numericFields.map(f => <option key={f.id} value={f.id}>{f.label}</option>)}</select></Field>
      </div>
      <table className="w-full text-sm">
        <thead><tr className="border-b-2 border-[var(--ink)]/20"><th className="text-right py-2">קבוצה</th><th>n</th><th>ממוצע</th><th>ס״ת</th></tr></thead>
        <tbody>
          {groupStats.map(g => <tr key={g.name} className="border-b border-[var(--ink)]/10"><td className="py-2">{g.name}</td><td className="text-center mono text-xs">{g.n}</td><td className="text-center mono text-xs"><b>{g.mean.toFixed(2)}</b></td><td className="text-center mono text-xs">{g.std.toFixed(2)}</td></tr>)}
        </tbody>
      </table>
      {tStat !== null && (
        <div className="banner-info">
          <div className="text-2xl">🧮</div>
          <div className="text-sm">
            <div><b>Welch's t-test</b> בין שתי הקבוצות הראשונות:</div>
            <div className="mono mt-1">t = {tStat.toFixed(3)} · p ≈ {pApprox.toFixed(4)} {pApprox < 0.05 && <span className="text-[var(--coral)] font-bold">· מובהק (p&lt;0.05)</span>}</div>
          </div>
        </div>
      )}
    </div>
  );
}

function DashCrosstab({ categoricalFields, responses }) {
  const [rowField, setRowField] = useState(categoricalFields[0]?.id || '');

  const rows = {}, allCols = new Set();
  responses.forEach(r => {

    rows[rv] = rows[rv] || {};

  return (

          <tbody>

function DashTrends({ responses }) {
  const byDate = {};
  responses.forEach(r => {
    const d = (r.submittedAt || '').slice(0, 10);
    if (d) byDate[d] = (byDate[d] || 0) + 1;
  });
  const data = Object.entries(byDate).sort((a,b) => a[0].localeCompare(b[0])).map(([date, count]) => ({ date, count }));

  const W = 560, H = 240, PAD = { top: 16, right: 16, bottom: 44, left: 40 };
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top - PAD.bottom;
  const maxCount = data.length ? Math.max(...data.map(d => d.count), 1) : 1;
  const pts = data.map((d, i) => ({
    x: PAD.left + (data.length < 2 ? chartW / 2 : (i / (data.length - 1)) * chartW),
    y: PAD.top + chartH - (d.count / maxCount) * chartH,
    ...d
  }));
  const polyline = pts.map(p => `${p.x},${p.y}`).join(' ');
  const area = pts.length > 1
    ? `M${pts[0].x},${PAD.top + chartH} ` + pts.map(p => `L${p.x},${p.y}`).join(' ') + ` L${pts[pts.length-1].x},${PAD.top + chartH} Z`
    : '';

  return (
    <div className="card-paper p-6">
      <h3 className="font-display text-2xl font-bold mb-4">מגמת השבת לאורך זמן</h3>
      {data.length === 0 ? <div className="banner-info"><div>אין מספיק נתונים להצגת מגמה.</div></div> : (
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', direction: 'ltr' }}>
          {[1,2,3,4].map(i => {
            const v = Math.round(maxCount * i / 4);
            const y = PAD.top + chartH - (v / maxCount) * chartH;
            return (
              <g key={i}>
                <line x1={PAD.left} x2={PAD.left + chartW} y1={y} y2={y} stroke="#1f193318" strokeDasharray="3 3" />
                <text x={PAD.left - 5} y={y + 4} textAnchor="end" fontSize="10" fill="#6c6582">{v}</text>
              </g>
            );
          })}
          {area && <path d={area} fill="#0d6e7a" opacity="0.08" />}
          {pts.length > 1 && <polyline points={polyline} fill="none" stroke="#0d6e7a" strokeWidth="2.5" strokeLinejoin="round" />}
          {pts.map((p, i) => (
            <g key={i}>
              <circle cx={p.x} cy={p.y} r="5" fill="#a8337a" stroke="#fff" strokeWidth="2" />
              <text x={p.x} y={p.y - 9} textAnchor="middle" fontSize="10" fill="#1f1933" fontWeight="bold">{p.count}</text>
              <text x={p.x} y={PAD.top + chartH + 14} textAnchor="middle" fontSize="9" fill="#6c6582"
                    transform={`rotate(-35, ${p.x}, ${PAD.top + chartH + 14})`}>{p.date.slice(5)}</text>
            </g>
          ))}
          <line x1={PAD.left} x2={PAD.left} y1={PAD.top} y2={PAD.top + chartH} stroke="#1f193340" />
          <line x1={PAD.left} x2={PAD.left + chartW} y1={PAD.top + chartH} y2={PAD.top + chartH} stroke="#1f193340" />
        </svg>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// SERIES LINK — Cross-questionnaire respondent linking
// ═══════════════════════════════════════════════════════════════════
function DashSeriesLink({ form, series, evals, allResponses }) {
  const [selectedSeries, setSelectedSeries] = useState(series[0]?.id || '');
  const [selectedRespondent, setSelectedRespondent] = useState(null);
  const [nameFilter, setNameFilter] = useState('');

  const activeSeries = series.find(s => s.id === selectedSeries);
  const seriesItems = activeSeries ? (activeSeries.items || []).slice().sort((a,b) => (a.order||0) - (b.order||0)) : [];
  const seriesForms = seriesItems.map(it => {
    const f = evals.find(e => e.id === it.formId);
    return { item: it, form: f };
  }).filter(x => x.form);

  // Build respondent linking: group by respondentName across all forms in series
  const formIds = seriesForms.map(sf => sf.form.id);
  const seriesResponses = allResponses.filter(r => formIds.includes(r.formId));

  // Build a map: respondentName → { formId → [responses] }
  const respondentMap = {};
  seriesResponses.forEach(r => {
    const name = (r.respondentName || '').trim();
    if (!name || name === 'אנונימי') return;
    if (!respondentMap[name]) respondentMap[name] = {};
    if (!respondentMap[name][r.formId]) respondentMap[name][r.formId] = [];
    respondentMap[name][r.formId].push(r);
  });

  // Filter: only respondents who appear in at least 2 forms
  const linkedRespondents = Object.entries(respondentMap)
    .filter(([_, byForm]) => Object.keys(byForm).length >= 2)
    .map(([name, byForm]) => ({ name, byForm, formCount: Object.keys(byForm).length, totalResponses: Object.values(byForm).flat().length }))
    .sort((a,b) => b.formCount - a.formCount || a.name.localeCompare(b.name, 'he'));

  // All named respondents (including those in only 1 form)
  const allNamedRespondents = Object.entries(respondentMap)
    .map(([name, byForm]) => ({ name, byForm, formCount: Object.keys(byForm).length, totalResponses: Object.values(byForm).flat().length }))
    .sort((a,b) => b.formCount - a.formCount || a.name.localeCompare(b.name, 'he'));

  const filteredRespondents = allNamedRespondents.filter(r =>
    !nameFilter || r.name.includes(nameFilter)
  );

  const selectedData = selectedRespondent
    ? allNamedRespondents.find(r => r.name === selectedRespondent)
    : null;

  return (
    <div>
      {/* Series selector if form belongs to multiple series */}
      {series.length > 1 && (
        <div className="mb-4">
          <label className="label">בחירת סדרה</label>
          <select className="input max-w-sm" value={selectedSeries} onChange={e => { setSelectedSeries(e.target.value); setSelectedRespondent(null); }}>
            {series.map(s => <option key={s.id} value={s.id}>{s.icon} {s.name}</option>)}
          </select>
        </div>
      )}

      {/* Series info header */}
      {activeSeries && (
        <div className="card-paper p-5 mb-5" style={{ background: 'linear-gradient(135deg, var(--purple-soft) 0%, var(--paper) 80%)' }}>
          <div className="flex items-center gap-3 mb-3">
            <span className="text-3xl">{activeSeries.icon || '🔗'}</span>
            <div>
              <h3 className="font-display text-xl font-bold">{activeSeries.name}</h3>
              <div className="text-sm text-[var(--ink-mute)]">{seriesForms.length} שאלונים בסדרה</div>
            </div>

function exportQuestionnaireXLSX(form) {
  const wb = XLSX.utils.book_new();
  // Sheet 1: Metadata
  const meta = [
    ['מאפיין', 'ערך'],
    ['מזהה', form.id],
    ['שם השאלון', form.title],
    ['אייקון', form.icon || ''],
    ['תיאור', form.description || ''],
    ['שפת מקור', form.sourceLang || 'he'],
    ['פעיל', form.isActive ? 'כן' : 'לא'],
    ['תבנית', form.isTemplate ? 'כן' : 'לא'],
    ['אנונימי', form.anonymous ? 'כן' : 'לא'],
    ['מצב משחק', form.gameMode ? 'כן' : 'לא'],
    ['נעול למו"פ', form.rdLocked ? 'כן' : 'לא'],
    ['פולס - פעיל', form.pulse?.enabled ? 'כן' : 'לא'],
    ['פולס - נקודות זמן', (form.pulse?.timepoints || []).join(', ')],
    ['קהל יעד', (form.audience?.types || []).join(', ')],
    ['סוג משיב', form.respondentType || ''],
    ['מעגל התערבות', form.interventionCircle || ''],
    ['תת-סוג התערבות', form.interventionType || ''],
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(meta), 'מטא-נתונים');
  // Sheet 2: Sections
  const sectRows = [['מזהה סעיף', 'מספר', 'שם', 'תיאור', 'תנאי דילוג', 'תנאי הצגה']];
  (form.sections || []).forEach((s, i) => {
    sectRows.push([s.id, i+1, s.name || '', s.description || '', JSON.stringify(s.skipIf || []), JSON.stringify(s.showIf || [])]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sectRows), 'סעיפים');
  // Sheet 3: Fields
  const fieldRows = [['מזהה שאלה', 'מזהה סעיף', 'סוג', 'תווית', 'תיאור', 'חובה', 'אפשרויות', 'הגדרות', 'תנאי דילוג', 'תנאי הצגה']];
  (form.sections || []).forEach(s => {
    (s.fields || []).forEach(f => {
      const settings = JSON.stringify({
        numberFormat: f.numberFormat, dateFormat: f.dateFormat, textFormat: f.textFormat,
        numberConfig: f.numberConfig, dateConfig: f.dateConfig, textConfig: f.textConfig,
        ratingConfig: f.ratingConfig, likertConfig: f.likertConfig, multiConfig: f.multiConfig, sliderConfig: f.sliderConfig
      });
      fieldRows.push([f.id, s.id, f.type, f.label || '', f.description || '', f.required ? 'כן' : 'לא',
        (f.options || []).join(' | '), settings, JSON.stringify(f.skipIf || []), JSON.stringify(f.showIf || [])]);
    });
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(fieldRows), 'שאלות');
  // Sheet 4: Translations
  const tr = form.translations || {};
  const trRows = [['שפה', 'מזהה ישות', 'סוג', 'מפתח', 'תרגום']];
  Object.entries(tr).forEach(([lang, items]) => {
    Object.entries(items || {}).forEach(([entId, fields]) => {
      Object.entries(fields || {}).forEach(([k, v]) => trRows.push([lang, entId, '', k, v]));
    });
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(trRows), 'תרגומים');
  const wbout = XLSX.write(wb, { type: 'array', bookType: 'xlsx' });
  downloadBlob(new Blob([wbout], { type: 'application/octet-stream' }), `שאלון_${form.title.replace(/[^א-תa-zA-Z0-9]+/g, '_')}.xlsx`);
}

async function importQuestionnaireXLSX(file) {
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array' });
  const meta = XLSX.utils.sheet_to_json(wb.Sheets['מטא-נתונים'] || wb.Sheets[wb.SheetNames[0]], { header: 1 });
  const sectSheet = XLSX.utils.sheet_to_json(wb.Sheets['סעיפים'] || {}, { header: 1 });
  const fieldSheet = XLSX.utils.sheet_to_json(wb.Sheets['שאלות'] || {}, { header: 1 });
  const trSheet = XLSX.utils.sheet_to_json(wb.Sheets['תרגומים'] || {}, { header: 1 });
  const metaMap = {};
  meta.slice(1).forEach(r => { if (r[0]) metaMap[r[0]] = r[1]; });
  const sections = sectSheet.slice(1).filter(r => r[0]).map(r => ({
    id: r[0], name: r[2] || '', description: r[3] || '',
    skipIf: safeJSON(r[4], []), showIf: safeJSON(r[5], []),
    fields: []
  }));
  fieldSheet.slice(1).filter(r => r[0]).forEach(r => {
    const sect = sections.find(s => s.id === r[1]) || sections[0];
    if (!sect) return;
    const settings = safeJSON(r[7], {});
    sect.fields.push({
      id: r[0], type: r[2], label: r[3] || '', description: r[4] || '',
      required: r[5] === 'כן' || r[5] === true,
      options: (r[6] || '').split('|').map(s => s.trim()).filter(Boolean),
      skipIf: safeJSON(r[8], []), showIf: safeJSON(r[9], []),
      ...settings
    });
  });
  const translations = {};
  trSheet.slice(1).filter(r => r[0]).forEach(r => {
    const [lang, entId, , k, v] = r;
    translations[lang] = translations[lang] || {};
    translations[lang][entId] = translations[lang][entId] || {};
    translations[lang][entId][k] = v;
  });
  return {
    id: uuid(),
    title: metaMap['שם השאלון'] || 'שאלון מיובא',
    icon: metaMap['אייקון'] || '📋',
    description: metaMap['תיאור'] || '',
    sourceLang: metaMap['שפת מקור'] || 'he',
    isActive: metaMap['פעיל'] === 'כן',
    isTemplate: metaMap['תבנית'] === 'כן',
    anonymous: metaMap['אנונימי'] === 'כן',
    gameMode: metaMap['מצב משחק'] === 'כן',
    rdLocked: metaMap['נעול למו"פ'] === 'כן',
    pulse: { enabled: metaMap['פולס - פעיל'] === 'כן', timepoints: (metaMap['פולס - נקודות זמן'] || '').split(',').map(s => s.trim()).filter(Boolean) },
    audience: { types: (metaMap['קהל יעד'] || '').split(',').map(s => s.trim()).filter(Boolean), projectIds: [], orgIds: [], facilitatorIds: [] },
    respondentType: metaMap['סוג משיב'] || '',
    interventionCircle: metaMap['מעגל התערבות'] || '',
    interventionType: metaMap['תת-סוג התערבות'] || '',
    sections,
    translations,
    createdAt: new Date().toISOString()
  };
}

function safeJSON(s, fb) { try { return JSON.parse(s); } catch { return fb; } }

function exportResponsesXLSX(form, responses) {
  const allFields = flattenFields(form);
  const headers = ['מזהה משיב', 'שם', 'תאריך'];
  const colMap = [];
  allFields.forEach(f => {
    if (f.type === 'multi' && f.options) {
      f.options.forEach(opt => { headers.push(`${f.label} :: ${opt}`); colMap.push({ field: f, opt }); });
    } else {
      headers.push(f.label);
      colMap.push({ field: f });
    }
  });
  const rows = [headers];
  responses.forEach(r => {
    const row = [r.id || '', r.respondentName || '', formatDateTime(r.submittedAt)];
    colMap.forEach(({ field, opt }) => {
      const v = r.answers?.[field.id];
      if (opt !== undefined) row.push(Array.isArray(v) && v.includes(opt) ? 1 : 0);
      else if (Array.isArray(v)) row.push(v.join(' | '));
      else row.push(v ?? '');
    });
    rows.push(row);
  });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'מענים');
  const wbout = XLSX.write(wb, { type: 'array', bookType: 'xlsx' });
  downloadBlob(new Blob([wbout], { type: 'application/octet-stream' }), `מענים_${form.title.replace(/[^א-תa-zA-Z0-9]+/g, '_')}.xlsx`);
}

async function importResponsesXLSX(file, form) {
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array' });
  const sheet = wb.Sheets['מענים'] || wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
  if (rows.length < 2) return [];
  const headers = rows[0];
  const allFields = flattenFields(form);
  const colMap = headers.slice(3).map(h => {
    const isMulti = h.includes(' :: ');
    if (isMulti) {
      const [label, opt] = h.split(' :: ');
      const f = allFields.find(ff => ff.label === label && ff.type === 'multi');
      return { field: f, opt };
    }
    const f = allFields.find(ff => ff.label === h);
    return { field: f };
  });
  return rows.slice(1).filter(r => r.length).map(r => {
    const answers = {};
    colMap.forEach((m, i) => {
      const v = r[i + 3];
      if (!m.field) return;
      if (m.opt !== undefined) {
        if (v === 1 || v === '1' || v === true) {
          answers[m.field.id] = answers[m.field.id] || [];
          answers[m.field.id].push(m.opt);
        }
      } else if (v !== undefined && v !== '') {
        answers[m.field.id] = v;
      }
    });
    return { id: r[0] || uuid(), respondentName: r[1] || '', submittedAt: r[2] || new Date().toISOString(), answers, formId: form.id };
  });
}

const EMOJI_PICKS = ['🔗', '🎓', '📚', '🛡️', '💼', '🎯', '🩺', '🏥', '🤝', '🌱', '🌍', '💡', '📋', '🎨', '🎤'];

function SeriesEditor({ initialSeries, evals, onSave, onCancel, onToast }) {
  const [series, setSeries] = useState(() => initialSeries.id ? initialSeries : {
    id: uuid('series'), name: '', description: '', icon: '🔗',
    facilitatorInstructions: '', items: [], createdAt: new Date().toISOString()
  });
  const [iconOpen, setIconOpen] = useState(false);

  const addItem = () => {
    const newItem = {
      id: uuid('item'), formId: '', timepointLabel: `T${series.items.length}`,
      adminTiming: '', itemInstructions: '', order: series.items.length
    };
    setSeries({ ...series, items: [...series.items, newItem] });
  };
  const updateItem = (id, patch) => setSeries({ ...series,
    items: series.items.map(it => it.id === id ? { ...it, ...patch } : it) });
  const removeItem = (id) => setSeries({ ...series, items: series.items.filter(it => it.id !== id) });
  const moveItem = (idx, dir) => {
    const items = [...series.items];
    const ni = idx + dir;
    if (ni < 0 || ni >= items.length) return;
    [items[idx], items[ni]] = [items[ni], items[idx]];
    items.forEach((it, i) => it.order = i);
    setSeries({ ...series, items });
  };

  const handleSave = () => {
    if (!series.name.trim()) { onToast('יש להזין שם לסדרה', 'warn'); return; }
    onSave({ ...series, updatedAt: new Date().toISOString() });
  };

  return (
    <div>
      <div className="hero p-7 mb-6">
        <div className="hero-content">
          <div className="flex items-start justify-between gap-3 mb-3">
            <div className="flex-1">
              <div className="text-xs font-display tracking-widest uppercase text-[var(--ink-mute)] mb-2">
                {initialSeries.id ? 'עריכת סדרה' : 'סדרה חדשה'}
              </div>
              <div className="flex items-center gap-3 mb-2">
                <button onClick={() => setIconOpen(!iconOpen)}
                        className="text-5xl hover:scale-110 transition cursor-pointer">{series.icon}</button>
                <input className="flex-1 bg-transparent border-0 border-b-2 border-[var(--ink)]/15 focus:border-[var(--pink)] outline-none font-display text-3xl font-bold py-1"
                       value={series.name} placeholder="שם הסדרה"
                       onChange={e => setSeries({ ...series, name: e.target.value })} />
              </div>
              {iconOpen && (
                <div className="flex flex-wrap gap-1.5 mb-3 p-3 bg-white/60 rounded-lg">
                  {EMOJI_PICKS.map(em => (
                    <button key={em} onClick={() => { setSeries({ ...series, icon: em }); setIconOpen(false); }}
                            className="text-2xl hover:bg-[var(--pink-soft)]/30 rounded p-1 transition">{em}</button>
                  ))}
                </div>
              )}
            </div>
            <div className="flex gap-2">
              <Btn variant="ghost" onClick={onCancel}>✕ ביטול</Btn>
              <Btn variant="primary" onClick={handleSave}>✓ שמירת הסדרה</Btn>
            </div>
          </div>
        </div>
      </div>

      <div className="card-paper p-5 mb-5">
        <Field label="תיאור הסדרה" hint="במה הסדרה עוסקת ולמי היא מיועדת">
          <textarea className="textarea" rows="2" value={series.description}
                    onChange={e => setSeries({ ...series, description: e.target.value })}
                    placeholder="לדוגמה: מסלול הכשרה למיודעות-טראומה לעובדי חינוך, כולל בייסליין לפני, מדידה מיד אחרי, ומעקב ב-3 חודשים." />
        </Field>
      </div>

      <div className="card-paper p-5 mb-5">
        <div className="flex items-baseline justify-between mb-2">
          <h3 className="font-display text-lg font-bold">📖 הוראות מנחה לסדרה כולה</h3>
          <div className="text-xs text-[var(--ink-mute)]">איך לתאם את העברת הסדרה</div>
        </div>
        <p className="text-xs text-[var(--ink-mute)] mb-3 leading-relaxed">
          ההוראות הכוללות: לוח זמנים, רצף, אילו תיאומים נדרשים בין השלבים, איך לקשר בין נקודות הזמן השונות,
          על מה לשים דגש כשמדובר במשיב חוזר באותה סדרה. ההוראות הספציפיות לכל שאלון יוגדרו בנפרד למטה.
        </p>
        <textarea className="textarea" rows="6"
                  value={series.facilitatorInstructions || ''}
                  onChange={e => setSeries({ ...series, facilitatorInstructions: e.target.value })}
                  placeholder='לדוגמה: שלוש נקודות זמן — T0 (3-7 ימים לפני), T1 (יום סיום ההכשרה), T2 (3 חודשים אחרי). חשוב לשלוח לכל המשתתפים את אותו מזהה 4 ספרות בכל הזמנים. ב-T1 לוודא שכל המשתתפים ממלאים לפני שעוזבים את האולם.' />
      </div>

      <div className="flex items-baseline justify-between mb-3">
        <h3 className="font-display text-xl font-bold">השאלונים בסדרה</h3>
        <Btn variant="soft" onClick={addItem}>+ הוסיפי שאלון לסדרה</Btn>
      </div>

      {series.items.length === 0 ? (
        <div className="card-paper p-8 text-center">
          <div className="text-4xl mb-2 opacity-40">📭</div>
          <p className="text-[var(--ink-mute)] mb-3">עדיין אין שאלונים בסדרה. הוסיפי לפחות אחד.</p>
          <Btn variant="primary" onClick={addItem}>+ שאלון ראשון בסדרה</Btn>
        </div>
      ) : (
        <div className="space-y-3">
          {series.items.map((item, idx) => (
            <SeriesItemEditor key={item.id} item={item} idx={idx} total={series.items.length}
              evals={evals}
              alreadySelected={series.items.filter(i => i.id !== item.id).map(i => i.formId)}
              onUpdate={(patch) => updateItem(item.id, patch)}
              onRemove={() => removeItem(item.id)}
              onMove={(dir) => moveItem(idx, dir)} />
          ))}
          <div className="text-center pt-2">
            <Btn variant="soft" onClick={addItem}>+ הוסיפי שאלון נוסף</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

function SeriesItemEditor({ item, idx, total, evals, alreadySelected, onUpdate, onRemove, onMove }) {

  return (
    <div className="card-paper p-4">

      <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
        <Field label="תווית נקודת הזמן" hint='לדוגמה: T0, T1, T+3m, "לפני", "בסוף"'>

                 onChange={e => onUpdate({ timepointLabel: e.target.value })} />

        <Field label="השאלון" hint="בחרי שאלון קיים מתוך הפורטל">
          <select className="input" value={item.formId || ''}
                  onChange={e => onUpdate({ formId: e.target.value })}>

        <input className="input" value={item.adminTiming || ''}

      </Field>
      <Field label="הוראות מנחה לשאלון הספציפי הזה">
        <textarea className="textarea" rows="3" value={item.itemInstructions || ''}
                  onChange={e => onUpdate({ itemInstructions: e.target.value })}
                  placeholder="הוראות ספציפיות להעברת השאלון הזה — מה לוודא לפני, איך להציג, איך לעקוב אחרי..." />
      </Field>
    </div>
  );
}

                    {idx + 1}

// AUTH — Login Screen
// ═══════════════════════════════════════════════════════════════════
function LoginScreen({ onLogin, error }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setLoading(true);
    await onLogin(username.trim(), password);
    setLoading(false);
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-6" dir="rtl">
      <div className="w-full max-w-sm">
        <div className="card-paper p-8">
          <div className="text-center mb-6">
            <div className="text-5xl mb-3">🔐</div>
            <h1 className="font-display text-3xl font-bold mb-1">כניסה לפורטל</h1>
            <p className="text-[var(--ink-mute)] text-sm">פורטל השאלונים של ITC · הקואליציה הישראלית לטראומה</p>
          </div>
          <form onSubmit={handleSubmit} className="space-y-4">
            <div>
              <label className="label">שם משתמש</label>
              <input className="input" value={username} onChange={e => setUsername(e.target.value)} placeholder="הזיני שם משתמש" autoFocus autoComplete="username" />
            </div>
            <div>
              <label className="label">סיסמה</label>
              <input className="input" type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="הזיני סיסמה" autoComplete="current-password" />
            </div>
            {error && (
              <div className="p-3 rounded-lg bg-[var(--red)]/10 border border-[var(--red)]/30 text-sm text-[var(--red)] text-center">{error}</div>
            )}
            <button type="submit" className="btn btn-primary w-full" disabled={loading || !username.trim() || !password}>
              {loading ? '⏳ מתחברת...' : '🔑 כניסה'}
            </button>
          </form>
        </div>

      </div>
    </div>
  );
}
