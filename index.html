// AUTH — User Management (admin only)
// ═══════════════════════════════════════════════════════════════════
function UserManagement({ users, setUsers, currentUser, evals, setEvals, showToast }) {
  const [editingUser, setEditingUser] = useState(null);
  const [newUsername, setNewUsername] = useState('');
  const [newDisplayName, setNewDisplayName] = useState('');
  const [newPassword, setNewPassword] = useState('');
  const [newRole, setNewRole] = useState('viewer');
  const [changePasswordFor, setChangePasswordFor] = useState(null);
  const [changePw, setChangePw] = useState('');
  const [showAdd, setShowAdd] = useState(false);

  // Per-form access editor
  const [accessFormId, setAccessFormId] = useState(null);

  const handleAddUser = async () => {
    if (!newUsername.trim() || !newPassword) { showToast('חסרים פרטים', 'warn'); return; }
    if (users.find(u => u.username === newUsername.trim())) { showToast('שם משתמש כבר קיים', 'warn'); return; }
    const pwHash = await hashPw(newPassword);
    const user = {
      id: uuid('user'),
      username: newUsername.trim(),
      displayName: newDisplayName.trim() || newUsername.trim(),
      passwordHash: pwHash,
      role: newRole,
      createdAt: new Date().toISOString(),
    };
    setUsers([...users, user]);
    setNewUsername(''); setNewDisplayName(''); setNewPassword(''); setNewRole('viewer');
    setShowAdd(false);
    showToast(`המשתמש "${user.displayName}" נוצר`);
  };

  const handleDeleteUser = (user) => {
    if (user.id === currentUser.id) { showToast('לא ניתן למחוק את עצמך', 'warn'); return; }
    setUsers(users.filter(u => u.id !== user.id));
    showToast(`המשתמש "${user.displayName}" נמחק`);
  };

  const handleRoleChange = (userId, role) => {
    if (userId === currentUser.id && role !== 'admin') {
      showToast('לא ניתן להוריד את עצמך מהרשאת מנהל', 'warn'); return;
    }
    setUsers(users.map(u => u.id === userId ? { ...u, role } : u));
    showToast('ההרשאה עודכנה');
  };

  const handleChangePassword = async (userId) => {
    if (!changePw) { showToast('יש להזין סיסמה חדשה', 'warn'); return; }
    const pwHash = await hashPw(changePw);
    setUsers(users.map(u => u.id === userId ? { ...u, passwordHash: pwHash } : u));
    setChangePw('');
    setChangePasswordFor(null);
    showToast('הסיסמה שונתה');
  };

  const roleInfo = (r) => ROLES[r] || ROLES.viewer;

  return (
    <div>
      <div className="hero p-8 mb-6">
        <div className="hero-content">
          <div className="flex items-start justify-between gap-4 flex-wrap">
            <div>
              <div className="text-xs font-display tracking-[0.3em] uppercase text-[var(--ink-mute)] mb-2">ניהול הרשאות</div>
              <h2 className="font-display text-4xl font-bold mb-2 leading-tight">משתמשים וגישה</h2>
              <p className="text-[var(--ink-mute)] font-display max-w-2xl leading-relaxed">
                ניהול משתמשים, תפקידים, והגדרת גישה לתוצאות שאלונים ברמה פרטנית.
              </p>
            </div>
            <Btn variant="primary" onClick={() => setShowAdd(true)}>+ משתמש חדש</Btn>
          </div>
        </div>
      </div>

      {/* Add user form */}
      {showAdd && (
        <div className="card-paper p-5 mb-5" style={{ borderRight: '3px solid var(--turq)' }}>
          <h3 className="font-display font-bold text-lg mb-3">הוספת משתמש חדש</h3>
          <div className="grid grid-cols-1 md:grid-cols-4 gap-3 mb-3">
            <div>
              <label className="label">שם משתמש (לכניסה)</label>
              <input className="input" value={newUsername} onChange={e => setNewUsername(e.target.value)} placeholder="username" dir="ltr" />
            </div>
            <div>
              <label className="label">שם תצוגה</label>
              <input className="input" value={newDisplayName} onChange={e => setNewDisplayName(e.target.value)} placeholder="שם מלא" />
            </div>
            <div>
              <label className="label">סיסמה</label>
              <input className="input" type="password" value={newPassword} onChange={e => setNewPassword(e.target.value)} placeholder="סיסמה חדשה" />
            </div>
            <div>
              <label className="label">תפקיד</label>
              <select className="input" value={newRole} onChange={e => setNewRole(e.target.value)}>
                {Object.values(ROLES).map(r => <option key={r.id} value={r.id}>{r.icon} {r.label}</option>)}
              </select>
            </div>
          </div>
          <div className="flex gap-2">
            <Btn variant="primary" onClick={handleAddUser}>✓ הוסיפי</Btn>
            <Btn variant="ghost" onClick={() => setShowAdd(false)}>ביטול</Btn>
          </div>
        </div>
      )}

      {/* Role legend */}
      <div className="card-paper p-4 mb-5">
        <div className="text-xs font-display font-bold text-[var(--ink-mute)] mb-2">מפתח תפקידים</div>
        <div className="flex flex-wrap gap-3">
          {Object.values(ROLES).map(r => (
            <div key={r.id} className="flex items-center gap-2 text-sm">
              <span className="tag" style={{ background: r.bg, color: r.color, borderColor: `${r.color}40` }}>
                {r.icon} {r.label}
              </span>
              <span className="text-[var(--ink-mute)] text-xs">
                {r.id === 'admin' ? 'גישה מלאה, ניהול משתמשים' :
                 r.id === 'analyst' ? 'צפייה בשאלונים ובתוצאות, ניתוח' :
                 'צפייה בתוצאות בלבד (לפי הרשאה)'}
              </span>
            </div>
          ))}
        </div>
      </div>

      {/* User list */}
      <div className="space-y-3 mb-8">
        {users.map(user => {
          const ri = roleInfo(user.role);
          const isMe = user.id === currentUser.id;
          return (
            <div key={user.id} className={`card-paper p-4 flex items-center gap-4 flex-wrap ${isMe ? 'ring-2 ring-[var(--turq)]/30' : ''}`}>
              {/* Avatar */}
              <div className="w-11 h-11 rounded-full flex items-center justify-center text-white font-display font-bold text-lg"
                   style={{ background: `linear-gradient(135deg, ${ri.color}, var(--ink))` }}>
                {(user.displayName || user.username).charAt(0)}
              </div>
              {/* Info */}
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="font-display font-bold">{user.displayName || user.username}</span>
                  <span className="font-mono text-xs text-[var(--ink-mute)]">@{user.username}</span>
                  {isMe && <span className="tag tag-active text-[10px]">את/ה</span>}
                </div>
                <div className="flex items-center gap-2 mt-1">
                  <span className="tag" style={{ background: ri.bg, color: ri.color, borderColor: `${ri.color}40` }}>
                    {ri.icon} {ri.label}
                  </span>
                  <span className="text-xs text-[var(--ink-mute)]">נוצר {formatDateTime(user.createdAt)}</span>
                </div>
              </div>
              {/* Actions */}
              <div className="flex items-center gap-1.5">
                <select className="input text-xs py-1 px-2" value={user.role}
                        style={{ width: 'auto', minWidth: '100px' }}
                        onChange={e => handleRoleChange(user.id, e.target.value)}
                        disabled={isMe}>
                  {Object.values(ROLES).map(r => <option key={r.id} value={r.id}>{r.icon} {r.label}</option>)}
                </select>
                {changePasswordFor === user.id ? (
                  <div className="flex items-center gap-1">
                    <input className="input text-xs py-1 px-2" type="password" value={changePw}
                           onChange={e => setChangePw(e.target.value)} placeholder="סיסמה חדשה"
                           style={{ width: '120px' }} />
                    <Btn variant="primary" className="text-xs" onClick={() => handleChangePassword(user.id)}>✓</Btn>
                    <Btn variant="ghost" className="text-xs" onClick={() => { setChangePasswordFor(null); setChangePw(''); }}>✕</Btn>
                  </div>
                ) : (
                  <Btn variant="ghost" className="text-xs" onClick={() => setChangePasswordFor(user.id)}>🔑 שנה סיסמה</Btn>
                )}
                {!isMe && (
                  <Btn variant="danger" className="text-xs" onClick={() => handleDeleteUser(user)}>🗑️</Btn>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* Per-form access management */}
      <div className="card-paper p-5">
        <h3 className="font-display font-bold text-xl mb-1">🔒 הרשאות צפייה בתוצאות שאלונים</h3>
        <p className="text-sm text-[var(--ink-mute)] mb-4 leading-relaxed">
          כברירת מחדל, כל משתמש רואה את כל השאלונים. כאן ניתן להגביל עבור כל שאלון — מי בדיוק רשאי לראות את התוצאות.
          <br/><strong>מנהלים (🔑) רואים תמיד הכל.</strong>
        </p>
        {evals.length === 0 ? (
          <p className="text-[var(--ink-mute)] text-center py-4">אין עדיין שאלונים.</p>
        ) : (
          <div className="space-y-2">
            {evals.map(ev => {
              const acl = ev.viewerAccess || [];
              const isOpen = accessFormId === ev.id;
              const nonAdminUsers = users.filter(u => u.role !== 'admin');
              return (
                <div key={ev.id} className={`p-3 rounded-lg border transition ${isOpen ? 'border-[var(--purple)]/40 bg-[var(--purple-soft)]/20' : 'border-[var(--ink)]/10 bg-white'}`}>
                  <div className="flex items-center justify-between cursor-pointer" onClick={() => setAccessFormId(isOpen ? null : ev.id)}>
                    <div className="flex items-center gap-2">
                      <span className="text-xl">{ev.icon || '📋'}</span>
                      <span className="font-display font-bold text-sm">{ev.title}</span>
                      {acl.length > 0 ? (
                        <span className="tag" style={{ background: 'var(--pink-soft)', color: 'var(--pink-deep)', borderColor: 'rgba(168,51,122,0.3)', fontSize: '0.65rem' }}>
                          🔒 מוגבל · {acl.length} משתמשים
                        </span>
                      ) : (
                        <span className="tag tag-active" style={{ fontSize: '0.65rem' }}>🌐 פתוח לכולם</span>
                      )}
                    </div>
                    <span className="text-[var(--ink-mute)] text-lg">{isOpen ? '▲' : '▼'}</span>
                  </div>
                  {isOpen && (
                    <div className="mt-3 pt-3 border-t border-[var(--ink)]/10">
                      {nonAdminUsers.length === 0 ? (
                        <p className="text-sm text-[var(--ink-mute)]">אין משתמשים שאינם מנהלים. הוסיפי משתמשים כדי להגביל גישה.</p>
                      ) : (
                        <div className="space-y-1.5">
                          <div className="flex items-center gap-2 mb-2">
                            <Btn variant="ghost" className="text-xs"
                                 onClick={() => {
                                   setEvals(evals.map(e => e.id === ev.id ? { ...e, viewerAccess: [] } : e));
                                   showToast('הגישה נפתחה לכולם');
                                 }}>🌐 פתח לכולם</Btn>
                            <Btn variant="ghost" className="text-xs"
                                 onClick={() => {
                                   setEvals(evals.map(e => e.id === ev.id ? { ...e, viewerAccess: nonAdminUsers.map(u => u.id) } : e));
                                   showToast('כל המשתמשים סומנו');
                                 }}>☑ סמני הכל</Btn>
                          </div>
                          {nonAdminUsers.map(u => {
                            const hasAccess = acl.includes(u.id);
                            const ri = roleInfo(u.role);
                            return (
                              <label key={u.id} className={`flex items-center gap-3 p-2 rounded-lg cursor-pointer transition ${hasAccess ? 'bg-[var(--turq-soft)]/40' : 'hover:bg-[var(--paper-warm)]'}`}>
                                <input type="checkbox" checked={hasAccess}
                                  onChange={() => {
                                    const newAcl = hasAccess
                                      ? acl.filter(id => id !== u.id)
                                      : [...acl, u.id];
                                    setEvals(evals.map(e => e.id === ev.id ? { ...e, viewerAccess: newAcl } : e));
                                  }}
                                  className="w-4 h-4 rounded accent-[var(--turq)]" />
                                <span className="tag" style={{ background: ri.bg, color: ri.color, borderColor: `${ri.color}40`, fontSize: '0.65rem' }}>
                                  {ri.icon}
                                </span>
                                <span className="text-sm font-display">{u.displayName || u.username}</span>
                                <span className="text-xs text-[var(--ink-mute)] font-mono">@{u.username}</span>
                              </label>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [evals, setEvals] = useState(() => storage.get(STORAGE_KEYS.evals, []));
  const [responses, setResponses] = useState(() => storage.get(STORAGE_KEYS.responses, []));
  const [userTemplates, setUserTemplates] = useState(() => storage.get(STORAGE_KEYS.templates, []));
  const [series, setSeries] = useState(() => storage.get(STORAGE_KEYS.series, []));
  const [users, setUsers] = useState(() => storage.get(STORAGE_KEYS.users, []));
  const [folders, setFolders] = useState(() => storage.get(STORAGE_KEYS.folders, []));
  const [notifications, setNotifications] = useState(() => storage.get(STORAGE_KEYS.notifications, []));
  const [currentUser, setCurrentUser] = useState(null);
  const [authReady, setAuthReady] = useState(false);
  const [authError, setAuthError] = useState('');
  const [showNotifPanel, setShowNotifPanel] = useState(false);
  const [view, setView] = useState(() => {
    // URL routing: ?fill=<id> opens the form in public (respondent) mode.
    // No portal chrome, no back-to-portal link, no exit button on completion.
    try {
      const params = new URLSearchParams(window.location.search);
      const fillId = params.get('fill');
      if (fillId) return { name: 'public_fill', formId: fillId };
    } catch (e) {}
    return { name: 'home' };
  }); // home | builder | dashboard | fill | public_fill | templates | series_edit | series_view
  const [mainTab, setMainTab] = useState('manage'); // manage | series | responses | users
  const [archiveTab, setArchiveTab] = useState('active'); // active | archive
  const [toast, setToast] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const importInputRef = useRef(null);
  const importResponsesInputRef = useRef(null);
  const [importTargetFormId, setImportTargetFormId] = useState(null);

  useEffect(() => { storage.set(STORAGE_KEYS.evals, evals); }, [evals]);
  useEffect(() => { storage.set(STORAGE_KEYS.responses, responses); }, [responses]);
  useEffect(() => { storage.set(STORAGE_KEYS.templates, userTemplates); }, [userTemplates]);
  useEffect(() => { storage.set(STORAGE_KEYS.series, series); }, [series]);
  useEffect(() => { storage.set(STORAGE_KEYS.users, users); }, [users]);
  useEffect(() => { storage.set(STORAGE_KEYS.folders, folders); }, [folders]);
  useEffect(() => { storage.set(STORAGE_KEYS.notifications, notifications); }, [notifications]);

  // Firebase realtime sync
  useEffect(() => {
    const setterMap = {
      [STORAGE_KEYS.evals]:         setEvals,
      [STORAGE_KEYS.responses]:     setResponses,
      [STORAGE_KEYS.templates]:     setUserTemplates,
      [STORAGE_KEYS.series]:        setSeries,
      [STORAGE_KEYS.users]:         setUsers,
      [STORAGE_KEYS.folders]:       setFolders,
      [STORAGE_KEYS.notifications]: setNotifications,
    };
    storage.listen((key, value) => {
      const setter = setterMap[key];
      if (setter) setter(value);
    });
  }, []);

  // Initialize default admin user + restore session
  useEffect(() => {
    const init = async () => {
      let currentUsers = storage.get(STORAGE_KEYS.users, []);
      if (currentUsers.length === 0) {
        const adminHash = await hashPw('Itc2024!');
        const defaultAdmin = {
          id: uuid('user'),
          username: 'admin',
          displayName: 'מנהלת ראשית',
          passwordHash: adminHash,
          role: 'admin',
          createdAt: new Date().toISOString(),
        };
        currentUsers = [defaultAdmin];
        storage.set(STORAGE_KEYS.users, currentUsers);
        setUsers(currentUsers);
      }
      // Restore session
      const session = getSession();
      if (session?.userId) {
        const user = currentUsers.find(u => u.id === session.userId);
        if (user) setCurrentUser(user);
      }
      setAuthReady(true);
    };
    init();
  }, []);

  // Login handler
  const handleLogin = async (username, password) => {
    setAuthError('');
    const pwHash = await hashPw(password);
    const user = users.find(u => u.username === username && u.passwordHash === pwHash);
    if (!user) {
      setAuthError('שם משתמש או סיסמה שגויים.');
      return;
    }
    setCurrentUser(user);
    saveSession({ userId: user.id, username: user.username, role: user.role });
    setAuthError('');
    // Show notification popup on login
    const unread = (storage.get(STORAGE_KEYS.notifications, [])).filter(n => !n.read).length;
    if (unread > 0) {
      setTimeout(() => showToast(`📬 יש לך ${unread} הודעות חדשות`, 'info'), 300);
    }
  };

  // Logout handler
  const handleLogout = () => {
    setCurrentUser(null);
    clearSession();
    setView({ name: 'home' });
    setMainTab('manage');
  };

  // Access control helper
  const canViewResponses = (formId) => {
    if (!currentUser) return false;
    if (currentUser.role === 'admin') return true;
    const form = evals.find(e => e.id === formId);
    if (!form) return false;
    const acl = form.viewerAccess || [];
    if (acl.length === 0) return true; // open to all
    return acl.includes(currentUser.id);
  };

  const isAdmin = currentUser?.role === 'admin';

  const showToast = (msg, type = 'success') => setToast({ msg, type, id: Date.now() });

  const activeEvals = evals.filter(e => !e.archived);
  const archivedEvals = evals.filter(e => e.archived);
  const responseCountByForm = (formId) => responses.filter(r => r.formId === formId).length;

  // ─── Filter & sort state ───
  const [searchQ, setSearchQ] = useState('');
  const [filterCircle, setFilterCircle] = useState('');  // '' | clinical | organizational | community
  const [filterType, setFilterType] = useState('');      // sub-type within selected circle
  const [sortBy, setSortBy] = useState('newest');        // newest | oldest | title | responses | active

  const displayedEvals = useMemo(() => {
    let list = archiveTab === 'active' ? activeEvals : archivedEvals;
    const q = searchQ.trim().toLowerCase();
    if (q) {
      list = list.filter(e =>
        (e.title || '').toLowerCase().includes(q) ||
        (e.description || '').toLowerCase().includes(q)
      );
    }
    if (filterCircle) list = list.filter(e => e.interventionCircle === filterCircle);
    if (filterType)   list = list.filter(e => e.interventionType   === filterType);
    const sorters = {
      newest:    (a, b) => (b.createdAt || b.created || '').localeCompare(a.createdAt || a.created || ''),
      oldest:    (a, b) => (a.createdAt || a.created || '').localeCompare(b.createdAt || b.created || ''),
      title:     (a, b) => (a.title || '').localeCompare(b.title || '', 'he'),
      responses: (a, b) => responseCountByForm(b.id) - responseCountByForm(a.id),
      active:    (a, b) => Number(!!b.isActive) - Number(!!a.isActive),
    };
    return [...list].sort(sorters[sortBy] || sorters.newest);
  }, [archiveTab, activeEvals, archivedEvals, searchQ, filterCircle, filterType, sortBy, responses]);

  const clearFilters = () => { setSearchQ(''); setFilterCircle(''); setFilterType(''); };
  const filtersActive = !!(searchQ || filterCircle || filterType);

  // Templates gallery: built-in + user-saved + questionnaires marked as template
  const allTemplatesForGallery = useMemo(() => [
    ...BUILTIN_TEMPLATES.map(t => ({ ...t, _origin: 'builtin' })),
    ...userTemplates.map(t => ({ ...t, _origin: 'user' })),
    ...evals.filter(e => e.isTemplate && !e.archived).map(e => ({ ...e, _origin: 'eval' }))
  ], [userTemplates, evals]);

  const startNewForm = () => setView({ name: 'builder', form: null });
  const openBuilder = (form) => setView({ name: 'builder', form });
  const openDashboard = (form) => {
    if (!canViewResponses(form.id)) {
      showToast('אין לך הרשאה לצפות בתוצאות שאלון זה', 'warn');
      return;
    }
    setView({ name: 'dashboard', form });
  };
  const openFill = (form) => setView({ name: 'fill', form });

  const saveForm = (form) => {
    const existing = evals.findIndex(e => e.id === form.id);
    if (existing >= 0) {
      const next = [...evals]; next[existing] = form;
      setEvals(next);
      showToast(`השאלון "${form.title}" עודכן בהצלחה`);
    } else {
      setEvals([...evals, form]);
      showToast(`השאלון "${form.title}" נוצר בהצלחה`);
    }
    setView({ name: 'home' });
  };

  const toggleArchive = (form) => {
    setEvals(evals.map(e => e.id === form.id ? { ...e, archived: !e.archived } : e));
    showToast(form.archived ? 'השאלון שוחזר מהארכיון' : 'השאלון הועבר לארכיון');
  };

  const toggleActive = (form) => {
    setEvals(evals.map(e => e.id === form.id ? { ...e, isActive: !e.isActive } : e));
    showToast(form.isActive ? 'השאלון הושהה' : 'השאלון הופעל');
  };

  const toggleTemplate = (form) => {
    setEvals(evals.map(e => e.id === form.id ? { ...e, isTemplate: !e.isTemplate } : e));
    showToast(form.isTemplate ? 'השאלון הוסר מתבניות' : 'השאלון סומן כתבנית — יופיע בגלריית התבניות');
  };

  const deleteForm = (form) => {
    setConfirm({
      title: 'מחיקת שאלון',
      message: `האם למחוק לצמיתות את השאלון "${form.title}"? פעולה זו אינה ניתנת לביטול. גם כל המענים שהתקבלו יימחקו.`,
      confirmLabel: 'מחקי לצמיתות',
      danger: true,
      onConfirm: () => {
        setEvals(evals.filter(e => e.id !== form.id));
        setResponses(responses.filter(r => r.formId !== form.id));
        showToast('השאלון נמחק');
        setConfirm(null);
      }
    });
  };

  const submitResponse = (form, response) => {
    const normalized = {
      ...response,
      id: uuid(),
      formId: form.id,
      respondentName: response.respName || response.respondentName || '',
      submittedAt: response.submittedAt || new Date().toISOString(),
      answers: response.answers || {},
    };
    setResponses([...responses, normalized]);
    showToast('המענה נשמר. תודה רבה!');
    // Create notification if enabled
    if (form.notifyOnResponse) {
      const notif = {
        id: uuid('notif'),
        type: 'response',
        formId: form.id,
        formTitle: form.title,
        formIcon: form.icon || '📋',
        respondentName: normalized.respondentName || 'אנונימי',
        timestamp: new Date().toISOString(),
        read: false,
      };
      setNotifications(prev => [notif, ...prev]);
    }
  };

  const useTemplate = (tpl) => {
    const fresh = { ...JSON.parse(JSON.stringify(tpl)), id: uuid(), isTemplate: false, archived: false, _origin: undefined, createdAt: new Date().toISOString() };
    setView({ name: 'builder', form: fresh });
  };

  const deleteUserTemplate = (tpl) => {
    setConfirm({
      title: 'מחיקת תבנית', message: `למחוק את התבנית "${tpl.title}"?`, confirmLabel: 'מחקי', danger: true,
      onConfirm: () => { setUserTemplates(userTemplates.filter(t => t.id !== tpl.id)); showToast('התבנית נמחקה'); setConfirm(null); }
    });
  };

  const handleImportQuestionnaire = async (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    try {
      const form = await importQuestionnaireXLSX(file);
      setEvals([...evals, form]);
      showToast(`השאלון "${form.title}" יובא בהצלחה`);
    } catch (err) {
      showToast('שגיאה בייבוא: ' + err.message, 'error');
    }
    e.target.value = '';
  };

  const handleImportResponses = async (e) => {
    const file = e.target.files?.[0]; if (!file || !importTargetFormId) return;
    const form = evals.find(ev => ev.id === importTargetFormId);
    if (!form) return;
    try {
      const newResponses = await importResponsesXLSX(file, form);
      setResponses([...responses, ...newResponses]);
      showToast(`${newResponses.length} מענים יובאו בהצלחה`);
    } catch (err) {
      showToast('שגיאה בייבוא: ' + err.message, 'error');
    }
    e.target.value = '';
    setImportTargetFormId(null);
  };

  const exportFromDashboard = (form, kind) => {
    const formResponses = responses.filter(r => r.formId === form.id);
    if (kind === 'responses') {
      exportResponsesXLSX(form, formResponses);
      showToast('המענים יוצאו לאקסל');
    } else if (kind === 'questionnaire') {
      exportQuestionnaireXLSX(form);
      showToast('מבנה השאלון יוצא לאקסל');
    } else if (kind === 'json') {
      downloadBlob(new Blob([JSON.stringify({ form, responses: formResponses }, null, 2)], { type: 'application/json' }), `${form.title}.json`);
      showToast('JSON הורד');
    }
  };

  // ═══ View routing ═══

  // Public fill mode — accessible WITHOUT login
  if (view.name === 'public_fill') {
    const form = evals.find(e => e.id === view.formId);
    if (!form) {
      return (
        <div className="min-h-screen flex items-center justify-center p-6">
          <div className="card-paper p-8 max-w-md text-center">
            <div className="text-6xl mb-4">🔍</div>
            <h2 className="font-display text-2xl font-bold mb-2">השאלון לא נמצא</h2>
            <p className="text-[var(--ink-mute)]">ייתכן שהקישור שגוי או שהשאלון הוסר. אנא פני/פנה לגורם ששלח לך את הקישור.</p>
          </div>
        </div>
      );
    }
    if (!form.isActive) {
      return (
        <div className="min-h-screen flex items-center justify-center p-6">
          <div className="card-paper p-8 max-w-md text-center">
            <div className="text-6xl mb-4">⏸️</div>
            <h2 className="font-display text-2xl font-bold mb-2">השאלון אינו פעיל כעת</h2>
            <p className="text-[var(--ink-mute)]">איסוף המענים לשאלון "{form.title}" הושהה. אם קיבלת קישור זה לאחרונה, ייתכן ששווה לפנות לגורם ששלח אותו.</p>
          </div>
        </div>
      );
    }
    return (
      <div className="min-h-screen">
        <div className="container max-w-3xl mx-auto px-4 py-8">
          <PublicFillForm form={form} onSubmit={(resp) => { submitResponse(form, resp); }} publicMode />
        </div>
      </div>
    );
  }

  // Auth loading
  if (!authReady) {
    return (
      <div className="min-h-screen flex items-center justify-center">
        <div className="text-center">
          <div className="text-5xl mb-3 animate-pulse">🔐</div>
          <p className="text-[var(--ink-mute)] font-display">טוען...</p>
        </div>
      </div>
    );
  }

  // Auth gate — if not logged in, show login screen
  if (!currentUser) {
    return <LoginScreen onLogin={handleLogin} error={authError} />;
  }

  // ═══ Authenticated views ═══
  if (view.name === 'builder') {
    return (
      <div className="min-h-screen">
        <div className="container max-w-7xl mx-auto px-4 py-6">
          <FormBuilder
            initialForm={view.form || {}}
            userTemplates={allTemplatesForGallery}
            onSave={saveForm}
            onClose={() => setView({ name: 'home' })}
            onToast={showToast}
          />
        </div>
        <Toast message={toast?.msg} type={toast?.type} onDismiss={() => setToast(null)} />
      </div>
    );
  }

  if (view.name === 'dashboard') {
    const formResponses = responses.filter(r => r.formId === view.form.id);
    return (
      <div className="min-h-screen">
        <div className="container max-w-7xl mx-auto px-4 py-6">
          <EvalDashboard form={view.form} responses={formResponses} series={series} evals={evals} allResponses={responses} onBack={() => setView({ name: 'home' })} onExport={(k) => exportFromDashboard(view.form, k)} />
        </div>
        <Toast message={toast?.msg} type={toast?.type} onDismiss={() => setToast(null)} />
      </div>
    );
  }

  if (view.name === 'fill') {
    return (
      <div className="min-h-screen">
        <div className="container max-w-3xl mx-auto px-4 py-8">
          <div className="text-center mb-4">
            <Btn variant="ghost" onClick={() => setView({ name: 'home' })}>← חזרה לפורטל</Btn>
          </div>
          <PublicFillForm form={view.form} onSubmit={(resp) => { submitResponse(view.form, resp); }} />
        </div>
        <Toast message={toast?.msg} type={toast?.type} onDismiss={() => setToast(null)} />
      </div>
    );
  }

  if (view.name === 'templates') {
    return (
      <div className="min-h-screen">
        <div className="container max-w-7xl mx-auto px-4 py-6">
          <div className="mb-4"><Btn variant="ghost" onClick={() => setView({ name: 'home' })}>← חזרה</Btn></div>
          <TemplatesGallery allTemplates={allTemplatesForGallery} onUse={useTemplate} onDelete={deleteUserTemplate} />
        </div>
        <Toast message={toast?.msg} type={toast?.type} onDismiss={() => setToast(null)} />
      </div>
    );
  }

  if (view.name === 'series_edit') {
    return (
      <div className="min-h-screen">
        <div className="container max-w-7xl mx-auto px-4 py-6">
          <SeriesEditor
            initialSeries={view.series || {}}
            evals={evals}
            onToast={showToast}
            onSave={(s) => {
              const existing = series.findIndex(x => x.id === s.id);
              if (existing >= 0) { const next = [...series]; next[existing] = s; setSeries(next); showToast('הסדרה עודכנה'); }
              else { setSeries([...series, s]); showToast('הסדרה נוצרה'); }
              setView({ name: 'home' }); setMainTab('series');
            }}
            onCancel={() => { setView({ name: 'home' }); setMainTab('series'); }}
          />
        </div>
        <Toast message={toast?.msg} type={toast?.type} onDismiss={() => setToast(null)} />
      </div>
    );
  }

  if (view.name === 'series_view') {
    const s = series.find(x => x.id === view.seriesId);
    if (!s) { setView({ name: 'home' }); setMainTab('series'); return null; }
    return (
      <div className="min-h-screen">
        <div className="container max-w-5xl mx-auto px-4 py-6">
          <SeriesViewer
            series={s}
            evals={evals}
            onBack={() => { setView({ name: 'home' }); setMainTab('series'); }}
            onEdit={() => setView({ name: 'series_edit', series: s })}
          />
        </div>
        <Toast message={toast?.msg} type={toast?.type} onDismiss={() => setToast(null)} />
      </div>
    );
  }

  // ═══ Home view ═══
  const totalResponses = responses.length;
  const formsWithResponses = new Set(responses.map(r => r.formId)).size;
  const activeCount = activeEvals.filter(e => e.isActive).length;

  return (
    <div className="min-h-screen">
      <div className="container max-w-7xl mx-auto px-4 py-6">

        {/* User bar */}
        <div className="flex items-center justify-between gap-3 mb-4 px-1">
          <div className="flex items-center gap-2 text-sm">
            <div className="w-8 h-8 rounded-full flex items-center justify-center text-white font-display font-bold text-sm"
                 style={{ background: `linear-gradient(135deg, ${(ROLES[currentUser.role] || ROLES.viewer).color}, var(--ink))` }}>
              {(currentUser.displayName || currentUser.username).charAt(0)}
            </div>
            <span className="font-display font-bold">{currentUser.displayName || currentUser.username}</span>
            <span className="tag" style={{
              background: (ROLES[currentUser.role] || ROLES.viewer).bg,
              color: (ROLES[currentUser.role] || ROLES.viewer).color,
              borderColor: `${(ROLES[currentUser.role] || ROLES.viewer).color}40`,
              fontSize: '0.65rem'
            }}>
              {(ROLES[currentUser.role] || ROLES.viewer).icon} {(ROLES[currentUser.role] || ROLES.viewer).label}
            </span>
          </div>
          <div className="flex items-center gap-2">
            <div className="relative">
              <button onClick={() => setShowNotifPanel(!showNotifPanel)}
                      className="relative px-2 py-1.5 rounded-lg border border-[var(--ink)]/10 hover:border-[var(--pink)]/40 bg-white transition text-lg"
                      title="הודעות">
                🔔
                {notifications.filter(n => !n.read).length > 0 && (
                  <span className="absolute -top-1.5 -left-1.5 bg-[var(--red)] text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center animate-pulse">
                    {notifications.filter(n => !n.read).length}
                  </span>
                )}
              </button>
              {showNotifPanel && (
                <div className="absolute top-12 left-0 z-50 card-paper shadow-xl border border-[var(--ink)]/15 w-96 max-h-[450px] overflow-y-auto" dir="rtl">
                  <div className="flex items-center justify-between p-3 border-b border-[var(--ink)]/10 sticky top-0 bg-white z-10">
                    <span className="font-display font-bold">🔔 הודעות</span>
                    <div className="flex gap-1">
                      {notifications.some(n => !n.read) && (
                        <button className="text-xs text-[var(--turq)] hover:underline"
                                onClick={() => setNotifications(notifications.map(n => ({ ...n, read: true })))}>סמן הכל כנקרא</button>
                      )}
                      {notifications.length > 0 && (
                        <button className="text-xs text-[var(--red)] hover:underline mr-2"
                                onClick={() => setNotifications([])}>נקה הכל</button>
                      )}
                    </div>
                  </div>
                  {notifications.length === 0 ? (
                    <div className="p-6 text-center text-[var(--ink-mute)] text-sm">אין הודעות</div>
                  ) : (
                    <div>
                      {notifications.map(n => (
                        <div key={n.id}
                             className={`p-3 border-b border-[var(--ink)]/5 cursor-pointer hover:bg-[var(--paper-warm)] transition ${!n.read ? 'bg-[var(--turq-soft)]/20' : ''}`}
                             onClick={() => {
                               setNotifications(notifications.map(x => x.id === n.id ? { ...x, read: true } : x));
                               const f = evals.find(e => e.id === n.formId);
                               if (f) { setView({ name: 'dashboard', form: f }); setShowNotifPanel(false); }
                             }}>
                          <div className="flex items-start gap-2">
                            <span className="text-xl">{n.formIcon}</span>
                            <div className="flex-1 min-w-0">
                              <div className="text-sm font-display font-bold leading-tight">{n.formTitle}</div>
                              <div className="text-xs text-[var(--ink-mute)] mt-0.5">
                                מענה חדש מ-{n.respondentName} · {formatDateTime(n.timestamp)}
                              </div>
                            </div>
                            {!n.read && <span className="w-2 h-2 rounded-full bg-[var(--turq)] mt-2 flex-shrink-0" />}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
            <Btn variant="ghost" onClick={handleLogout} className="text-xs">🚪 התנתקות</Btn>
          </div>
        </div>

        {/* Hero */}
        <div className="hero p-8 mb-6">

            <div className="flex items-start justify-between gap-4 flex-wrap">

                <p className="text-[var(--ink-mute)] font-display text-lg max-w-2xl leading-relaxed">מערכת מקצועית לבניית שאלונים, איסוף מענים, וניתוח הממצאים. עיצוב שאלון הוא לא רק טופס — הוא הזמנה לדיאלוג. נסחי בקפידה.</p>

              <div className="splash-mark">{evals.length}</div>

              <div className="kpi"><div className="kpi-num">{activeCount}</div><div className="kpi-lbl">פעילים</div></div>
              <div className="kpi"><div className="kpi-num">{formsWithResponses}</div><div className="kpi-lbl">עם מענים</div></div>
              <div className="kpi"><div className="kpi-num">{totalResponses}</div><div className="kpi-lbl">סך המענים</div></div>
            </div>
          </div>
        </div>

        <div className="flex flex-wrap items-center justify-between gap-3 mb-5">

            <button onClick={() => setMainTab('series')} className={`tab ${mainTab === 'series' ? 'tab-active' : ''}`}>🔗 סדרות שאלונים</button>

            <Btn variant="ghost" onClick={() => setView({ name: 'templates' })}>📚 גלריית תבניות</Btn>

            <Btn variant="primary" onClick={startNewForm}>+ שאלון חדש</Btn>
            <input type="file" accept=".xlsx,.xls" ref={importInputRef} onChange={handleImportQuestionnaire} className="hidden" />
            <input type="file" accept=".xlsx,.xls" ref={importResponsesInputRef} onChange={handleImportResponses} className="hidden" />

        </div>

              <button onClick={() => setArchiveTab('archive')} className={`tab text-sm ${archiveTab === 'archive' ? 'tab-active' : ''}`}>📦 ארכיון ({archivedEvals.length})</button>
            </div>

            {/* Filter & sort bar */}
            <div className="card-paper p-4 mb-4">
              <div className="grid grid-cols-1 md:grid-cols-12 gap-3 items-end">
                <div className="md:col-span-5">
                  <div className="text-xs font-display font-bold text-[var(--ink-mute)] mb-1.5">🔍 חיפוש</div>
                  <div className="relative">
                    <input className="input pl-8" placeholder="חיפוש בכותרת ובתיאור…"
                           value={searchQ} onChange={e => setSearchQ(e.target.value)} />
                    {searchQ && (
                      <button onClick={() => setSearchQ('')}
                              className="absolute left-2 top-1/2 -translate-y-1/2 text-[var(--ink-mute)] hover:text-[var(--ink)] text-sm">✕</button>
                    )}
                  </div>
                </div>
                <div className="md:col-span-3">
                  <div className="text-xs font-display font-bold text-[var(--ink-mute)] mb-1.5">🎯 מעגל התערבות</div>
                  <select className="input" value={filterCircle}
                          onChange={e => { setFilterCircle(e.target.value); setFilterType(''); }}>
                    <option value="">כל המעגלים</option>
                    {INTERVENTION_CIRCLES.map(c => (
                      <option key={c.id} value={c.id}>{c.icon} {c.label}</option>
                    ))}
                  </select>
                </div>
                <div className="md:col-span-2">
                  <div className="text-xs font-display font-bold text-[var(--ink-mute)] mb-1.5">תת-סוג</div>
                  <select className="input" value={filterType}
                          onChange={e => setFilterType(e.target.value)}
                          disabled={!filterCircle}>
                    <option value="">{filterCircle ? 'כל התת-סוגים' : '— בחרי מעגל —'}</option>
                    {(findCircle(filterCircle)?.types || []).map(t => (
                      <option key={t} value={t}>{t}</option>
                    ))}
                  </select>
                </div>
                <div className="md:col-span-2">
                  <div className="text-xs font-display font-bold text-[var(--ink-mute)] mb-1.5">⇅ מיון</div>
                  <select className="input" value={sortBy} onChange={e => setSortBy(e.target.value)}>
                    <option value="newest">החדש ביותר</option>
                    <option value="oldest">הישן ביותר</option>
                    <option value="title">לפי שם א-ת</option>
                    <option value="responses">לפי מספר מענים</option>
                    <option value="active">פעילים בראש</option>
                  </select>
                </div>
              </div>
              {filtersActive && (
                <div className="flex items-center justify-between gap-3 mt-3 pt-3 border-t border-[var(--ink)]/8">
                  <div className="text-xs text-[var(--ink-mute)]">
                    מציגה <b className="text-[var(--pink-deep)]">{displayedEvals.length}</b> מתוך {archiveTab === 'active' ? activeEvals.length : archivedEvals.length} שאלונים
                    {searchQ && <span> · חיפוש: "<b>{searchQ}</b>"</span>}
                    {filterCircle && <span> · מעגל: <b>{circleLabel(filterCircle)}</b></span>}
                    {filterType && <span> · תת-סוג: <b>{filterType}</b></span>}
                  </div>
                  <Btn variant="ghost" onClick={clearFilters} className="text-xs">✕ נקי סינון</Btn>
                </div>
              )}
            </div>

            {displayedEvals.length === 0 ? (
              <div className="card-paper p-12 text-center">
                <div className="text-6xl mb-4 opacity-40">{filtersActive ? '🔍' : '📭'}</div>
                <h3 className="font-display text-2xl font-bold mb-2">
                  {filtersActive ? 'אין שאלונים שתואמים לסינון' :
                   archiveTab === 'active' ? 'אין שאלונים פעילים עדיין' : 'הארכיון ריק'}
                </h3>
                <p className="text-[var(--ink-mute)] mb-5 max-w-md mx-auto">
                  {filtersActive ? 'נסי לשנות את תנאי הסינון או לנקות אותם.' :
                   archiveTab === 'active' ? 'התחילי משאלון חדש או בחרי תבנית מוכנה מהגלריה.' :
                   'שאלונים שתעבירי לארכיון יופיעו כאן.'}
                </p>
                {filtersActive && (
                  <Btn variant="soft" onClick={clearFilters}>✕ נקי סינון</Btn>
                )}
                {!filtersActive && archiveTab === 'active' && (
                  <div className="flex gap-2 justify-center">
                    <Btn variant="primary" onClick={startNewForm}>+ שאלון חדש</Btn>
                    <Btn variant="ghost" onClick={() => setView({ name: 'templates' })}>גלריית תבניות</Btn>
                  </div>
                )}
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                {displayedEvals.map(form => (
                  <QuestionnaireCard key={form.id} form={form}
                    series={series}
                    responseCount={responseCountByForm(form.id)}
                    canView={canViewResponses(form.id)}
                    isAdmin={isAdmin}
                    onDashboard={() => openDashboard(form)}
                    onEdit={() => openBuilder(form)}
                    onFill={() => openFill(form)}
                    onToggleTemplate={() => toggleTemplate(form)}
                    onToggleActive={() => toggleActive(form)}
                    onToggleArchive={() => toggleArchive(form)}
                    onDelete={() => deleteForm(form)}
                    onImportResponses={() => { setImportTargetFormId(form.id); importResponsesInputRef.current?.click(); }}
                    onExportResponses={() => { exportResponsesXLSX(form, responses.filter(r => r.formId === form.id)); showToast('המענים יוצאו'); }}
                    onExportQuestionnaire={() => { exportQuestionnaireXLSX(form); showToast('מבנה השאלון יוצא'); }}
                  />
                ))}
              </div>
            )}
          </div>
        )}

        {mainTab === 'folders' && (() => {
          // Build folder tree from form.folder / form.folderSub
          const folderTree = {};
          evals.forEach(ev => {
            const f = ev.folder || '';
            if (!f) return;
            if (!folderTree[f]) folderTree[f] = { subs: {}, forms: [] };
            const sub = ev.folderSub || '';
            if (sub) {
              if (!folderTree[f].subs[sub]) folderTree[f].subs[sub] = [];
              folderTree[f].subs[sub].push(ev);
            } else {
              folderTree[f].forms.push(ev);
            }
          });
          const unfoldered = evals.filter(e => !e.folder);
          const folderNames = Object.keys(folderTree).sort((a,b) => a.localeCompare(b, 'he'));
          return (
            <div>
              <div className="hero p-8 mb-6">
                <div className="hero-content">
                  <div className="flex items-start justify-between gap-4 flex-wrap">
                    <div>
                      <div className="text-xs font-display tracking-[0.3em] uppercase text-[var(--ink-mute)] mb-2">ארגון שאלונים</div>
                      <h2 className="font-display text-4xl font-bold mb-2 leading-tight">תיקיות אישיות</h2>
                      <p className="text-[var(--ink-mute)] font-display max-w-2xl leading-relaxed">
                        כל מנהל/ת פרויקט יכול/ה ליצור תיקיות ותת-תיקיות ולשייך אליהן שאלונים.
                        שיוך מתבצע דרך לשונית "הגדרות" בעריכת השאלון.
                      </p>
                    </div>
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-4 gap-3 mb-5">
                <div className="kpi"><div className="kpi-num">{folderNames.length}</div><div className="kpi-lbl">תיקיות</div></div>
                <div className="kpi"><div className="kpi-num">{evals.filter(e => e.folder).length}</div><div className="kpi-lbl">שאלונים מסווגים</div></div>
                <div className="kpi"><div className="kpi-num">{unfoldered.length}</div><div className="kpi-lbl">ללא תיקייה</div></div>
                <div className="kpi"><div className="kpi-num">{Object.values(folderTree).reduce((s,f) => s + Object.keys(f.subs).length, 0)}</div><div className="kpi-lbl">תתי-תיקיות</div></div>
              </div>

              {folderNames.length === 0 ? (
                <div className="card-paper p-12 text-center">
                  <div className="text-6xl mb-4 opacity-40">📁</div>
                  <h3 className="font-display text-2xl font-bold mb-2">אין עדיין תיקיות</h3>
                  <p className="text-[var(--ink-mute)] max-w-md mx-auto leading-relaxed">
                    כדי ליצור תיקייה, פתחי שאלון לעריכה → לשונית "הגדרות" → שדה "תיקייה".
                    <br/>כל שם תיקייה ייצור תיקייה חדשה אוטומטית.
                  </p>
                </div>
              ) : (
                <div className="space-y-4">
                  {folderNames.map(fname => {
                    const folder = folderTree[fname];
                    const subNames = Object.keys(folder.subs).sort((a,b) => a.localeCompare(b, 'he'));
                    const totalInFolder = folder.forms.length + subNames.reduce((s,sub) => s + folder.subs[sub].length, 0);
                    return (
                      <div key={fname} className="card-paper p-5">
                        <div className="flex items-center gap-3 mb-3">
                          <span className="text-3xl">📁</span>
                          <div className="flex-1">
                            <h3 className="font-display font-bold text-xl">{fname}</h3>
                            <div className="text-xs text-[var(--ink-mute)]">{totalInFolder} שאלונים · {subNames.length} תתי-תיקיות</div>
                          </div>
                        </div>

                        {/* Direct forms */}
                        {folder.forms.length > 0 && (
                          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2 mb-3">
                            {folder.forms.map(ev => (
                              <div key={ev.id} className="p-3 rounded-lg border border-[var(--ink)]/10 bg-white hover:border-[var(--pink)]/30 transition cursor-pointer flex items-center gap-2"
                                   onClick={() => openDashboard(ev)}>
                                <span className="text-xl">{ev.icon || '📋'}</span>
                                <div className="flex-1 min-w-0">
                                  <div className="font-display font-bold text-sm truncate">{ev.title}</div>
                                  <div className="text-xs text-[var(--ink-mute)]">{responseCountByForm(ev.id)} מענים</div>
                                </div>
                              </div>
                            ))}
                          </div>
                        )}

                        {/* Sub-folders */}
                        {subNames.map(sub => (
                          <div key={sub} className="mr-6 mb-2">
                            <div className="flex items-center gap-2 mb-1.5">
                              <span className="text-lg">📂</span>
                              <span className="font-display font-bold text-sm">{sub}</span>
                              <span className="text-xs text-[var(--ink-mute)]">({folder.subs[sub].length})</span>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2 mr-5">
                              {folder.subs[sub].map(ev => (
                                <div key={ev.id} className="p-2.5 rounded-lg border border-[var(--ink)]/8 bg-[var(--paper-warm)]/30 hover:border-[var(--pink)]/30 transition cursor-pointer flex items-center gap-2"
                                     onClick={() => openDashboard(ev)}>
                                  <span>{ev.icon || '📋'}</span>
                                  <div className="flex-1 min-w-0">
                                    <div className="font-display font-bold text-xs truncate">{ev.title}</div>
                                    <div className="text-[10px] text-[var(--ink-mute)]">{responseCountByForm(ev.id)} מענים</div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    );
                  })}

                  {/* Unfoldered */}
                  {unfoldered.length > 0 && (
                    <div className="card-paper p-5 opacity-75">
                      <div className="flex items-center gap-3 mb-3">
                        <span className="text-2xl">📄</span>
                        <div>
                          <h4 className="font-display font-bold">ללא תיקייה</h4>
                          <div className="text-xs text-[var(--ink-mute)]">{unfoldered.length} שאלונים</div>
                        </div>
                      </div>
                      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
                        {unfoldered.map(ev => (
                          <div key={ev.id} className="p-2.5 rounded-lg border border-[var(--ink)]/8 bg-white flex items-center gap-2 cursor-pointer hover:border-[var(--pink)]/30 transition"
                               onClick={() => { openBuilder(ev); }}>
                            <span>{ev.icon || '📋'}</span>
                            <div className="text-xs font-display truncate">{ev.title}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })()}

        {mainTab === 'series' && (
          <SeriesListView
            series={series}
            evals={evals}
            onCreate={() => setView({ name: 'series_edit', series: {} })}
            onEdit={(s) => setView({ name: 'series_edit', series: s })}
            onView={(s) => setView({ name: 'series_view', seriesId: s.id })}
            onDelete={(s) => setConfirm({
              title: 'מחיקת סדרה',
              message: `האם למחוק את "${s.name}"? השאלונים עצמם לא יימחקו — רק האיגוד.`,
              confirmLabel: 'מחקי',
              danger: true,
              onConfirm: () => { setSeries(series.filter(x => x.id !== s.id)); showToast('הסדרה נמחקה'); setConfirm(null); }
            })}
          />
        )}

        {mainTab === 'responses' && (
          <div>
            {totalResponses === 0 ? (
              <div className="card-paper p-12 text-center">
                <div className="text-6xl mb-4 opacity-40">📊</div>
                <h3 className="font-display text-2xl font-bold mb-2">אין עדיין מענים</h3>
                <p className="text-[var(--ink-mute)] max-w-md mx-auto">ברגע שיתקבלו מענים ראשונים, תוכלי לראות כאן לוח ניתוח לכל שאלון.</p>
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                {evals.filter(e => responseCountByForm(e.id) > 0 && canViewResponses(e.id)).map(form => (
                  <div key={form.id} className="card-paper p-5 hover-lift">
                    <div className="flex items-start gap-3 mb-3">
                      <div className="text-4xl">{form.icon || '📋'}</div>
                      <div className="flex-1 min-w-0">
                        <h3 className="font-display font-bold text-lg leading-tight">{form.title}</h3>
                        <div className="flex items-center gap-2 mt-1">
                          <span className="tag tag-sage">{responseCountByForm(form.id)} מענים</span>
                        </div>
                      </div>
                    </div>
                    <Btn variant="primary" onClick={() => openDashboard(form)} className="w-full">פתחי לוח ניתוח</Btn>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {mainTab === 'users' && isAdmin && (
          <UserManagement
            users={users}
            setUsers={setUsers}
            currentUser={currentUser}
            evals={evals}
            setEvals={setEvals}
            showToast={showToast}
          />
        )}
      </div>

      {confirm && <Confirm open={true} title={confirm.title} body={confirm.message} danger={confirm.danger} confirmText={confirm.confirmLabel} onConfirm={confirm.onConfirm} onCancel={() => setConfirm(null)} />}
      <Toast message={toast?.msg} type={toast?.type} onDismiss={() => setToast(null)} />
    </div>
  );
}

function QuestionnaireCard({ form, series, responseCount, canView, isAdmin, onDashboard, onEdit, onFill, onToggleTemplate, onToggleActive, onToggleArchive, onDelete, onImportResponses, onExportResponses, onExportQuestionnaire }) {
  const [showQR, setShowQR] = useState(false);
  const qrRef = useRef(null);
  const publicURL = `${window.location.origin}${window.location.pathname}?fill=${form.id}`;

  // Compute which series this form belongs to
  const formSeries = (series || []).filter(s =>
    (s.items || []).some(it => it.formId === form.id)
  ).map(s => {
    const item = s.items.find(it => it.formId === form.id);
    return { seriesName: s.name, seriesIcon: s.icon || '🔗', timepointLabel: item?.timepointLabel || '' };
  });

  useEffect(() => {
    if (showQR && qrRef.current) {
      qrRef.current.innerHTML = '';
      try { makeQR(qrRef.current, publicURL, 180); } catch(e) {}
    }
  }, [showQR, publicURL]);

  return (
    <div className="card-paper p-5 hover-lift flex flex-col">
      <div className="flex items-start gap-3 mb-3">
        <div className="text-4xl">{form.icon || '📋'}</div>
        <div className="flex-1 min-w-0">
          <h3 className="font-display font-bold text-lg leading-tight mb-1">{form.title}</h3>
          <div className="flex flex-wrap items-center gap-1.5">
            <span className={`tag ${form.isActive ? 'tag-active' : 'tag-inactive'}`}>{form.isActive ? '● פעיל' : '⏸ מושהה'}</span>
            {form.isTemplate && <span className="tag tag-template">תבנית</span>}
            {form.anonymous && <span className="tag tag-plum">אנונימי</span>}
            {form.gameMode && <span className="tag tag-coral">משחק</span>}
            {form.interventionCircle && (
              <span className="tag tag-teal" title={circleLabel(form.interventionCircle)}>
                {findCircle(form.interventionCircle)?.icon} {circleLabel(form.interventionCircle)}
                {form.interventionType && <span className="opacity-75"> · {form.interventionType}</span>}
              </span>
            )}
            {formSeries.map((fs, i) => (
              <span key={i} className="tag tag-series" title={`סדרה: ${fs.seriesName}`}>
                {fs.seriesIcon} {fs.seriesName}{fs.timepointLabel ? ` · ${fs.timepointLabel}` : ''}
              </span>
            ))}
            {!canView && (form.viewerAccess || []).length > 0 && (
              <span className="tag" style={{ background: 'rgba(196,77,77,0.12)', color: 'var(--red)', borderColor: 'rgba(196,77,77,0.3)', fontSize: '0.65rem' }}>
                🔒 גישה מוגבלת
              </span>
            )}
            {isAdmin && (form.viewerAccess || []).length > 0 && (
              <span className="tag" style={{ background: 'var(--pink-soft)', color: 'var(--pink-deep)', borderColor: 'rgba(168,51,122,0.3)', fontSize: '0.65rem' }}>
                🔒 {(form.viewerAccess || []).length} בעלי גישה
              </span>
            )}
            {form.folder && (
              <span className="tag" style={{ background: '#e8f0fe', color: '#1a56db', borderColor: 'rgba(26,86,219,0.25)', fontSize: '0.65rem' }}>
                📁 {form.folder}{form.folderSub ? ` / ${form.folderSub}` : ''}
              </span>
            )}
            {form.notifyOnResponse && (
              <span className="tag" style={{ background: '#fef3c7', color: '#92400e', borderColor: 'rgba(146,64,14,0.25)', fontSize: '0.65rem' }}>
                🔔 הודעות
              </span>
            )}
          </div>
        </div>
      </div>
      {form.description && <p className="text-sm text-[var(--ink-mute)] mb-3 leading-relaxed line-clamp-2">{form.description}</p>}
      <div className="text-xs text-[var(--ink-mute)] mb-3 flex items-center gap-3">
        <span>📑 {(form.sections || []).length} סעיפים</span>
        <span>•</span>
        <span>📝 {flattenFields(form).length} שאלות</span>
        <span>•</span>
        <span className="font-bold text-[var(--gold)]">📨 {responseCount} מענים</span>
      </div>

      <div className="grid grid-cols-3 gap-1.5 mb-2">
        <Btn variant={canView ? "primary" : "ghost"} onClick={onDashboard} className="text-xs">{canView ? '📊 ניתוח' : '🔒 ניתוח'}</Btn>
        <Btn variant="soft" onClick={onEdit} className="text-xs">✏️ עריכה</Btn>
        <Btn variant="ghost" onClick={onFill} className="text-xs">👁 תצוגה</Btn>
      </div>
      <div className="grid grid-cols-4 gap-1.5 mb-2">
        <IconBtn icon={form.isTemplate ? '⭐' : '☆'} title={form.isTemplate ? 'הסירי מתבניות' : 'סמני כתבנית'} onClick={onToggleTemplate} />
        <IconBtn icon={form.isActive ? '⏸' : '▶'} title={form.isActive ? 'השהי' : 'הפעילי'} onClick={onToggleActive} />
        <IconBtn icon={form.archived ? '↩' : '📦'} title={form.archived ? 'שחזרי' : 'לארכיון'} onClick={onToggleArchive} />
        <IconBtn icon="🗑️" title="מחקי" onClick={onDelete} danger />
      </div>
      <div className="grid grid-cols-2 gap-1.5 mb-2">
        <Btn variant="ghost" onClick={onExportQuestionnaire} className="text-xs">📤 ייצוא שאלון</Btn>
        <Btn variant="ghost" onClick={onExportResponses} className="text-xs" disabled={responseCount===0 || !canView}>📥 ייצוא מענים</Btn>
      </div>
      <div className="grid grid-cols-2 gap-1.5 mb-3">
        <Btn variant="ghost" onClick={onImportResponses} className="text-xs">📥 ייבוא מענים</Btn>
        <Btn variant="ghost" onClick={() => setShowQR(!showQR)} className="text-xs">{showQR ? '🔼 הסתירי QR' : '📱 קישור + QR'}</Btn>
      </div>

      {showQR && (
        <div className="mt-2 p-3 rounded-lg bg-[var(--paper-2)] border border-[var(--ink)]/10 text-center">
          <div ref={qrRef} className="flex justify-center mb-2"></div>
          <div className="text-xs mono break-all text-[var(--ink-mute)] mb-2">{publicURL}</div>
          <div className="grid grid-cols-2 gap-1.5">
            <Btn variant="soft" onClick={() => { navigator.clipboard?.writeText(publicURL); }} className="text-xs">📋 העתיקי</Btn>
            <Btn variant="soft" onClick={() => window.open(publicURL, '_blank')} className="text-xs">↗ פתחי</Btn>
          </div>
          <div className="mt-2 text-xs text-[var(--ink-mute)] leading-relaxed text-right">
            הקישור פותח ישירות את מסך מילוי השאלון בלבד — ללא הפורטל.
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// MOUNT — load cloud data, then render
// ═══════════════════════════════════════════════════════════════════
(async function boot() {
  const status = document.getElementById('boot-detail');
  if (status) status.textContent = 'מסנכרן עם הענן...';
  try { await storage.init(); } catch (e) { console.warn('Firebase init skipped', e); }
  if (status) status.textContent = 'מאתחל את הפורטל...';
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();

</script>
</body>
</html>
