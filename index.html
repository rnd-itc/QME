<style>
  :root {
    /* === Dominant dark colors === */
    --turq:        #0d6e7a;  /* dark turquoise — primary */
    --turq-deep:   #074d56;
    --turq-soft:   #b8dde2;

    --pink:        #a8337a;  /* dark pink — secondary */
    --pink-deep:   #7d2058;
    --pink-soft:   #f4cde0;

    --purple:      #5b3091;  /* dark purple — tertiary */
    --purple-deep: #3d1f6e;
    --purple-soft: #ddc8ee;

    /* === Body text === */
    --ink:         #1f1933;  /* deep purple-ink */
    --ink-soft:    #3d3553;
    --ink-mute:    #6c6582;

    /* === Light gradient surface === */
    --paper:       #fbf6fc;  /* faint lavender cream */
    --paper-warm:  #fef0f7;  /* pink-tinted cream */
    --paper-deeper:#efe1f0;  /* slightly deeper lilac */

    /* === Backwards-compat aliases — preserve all existing class usages === */
    --gold:        #a8337a;  /* now pink */
    --gold-deep:   #7d2058;
    --gold-soft:   #f4cde0;
    --sage:        #0d6e7a;  /* now turquoise */
    --sage-soft:   #b8dde2;
    --coral:       #5b3091;  /* now purple */
    --coral-soft:  #ddc8ee;
    --teal:        #2a8a96;
    --plum:        #7d2058;
    --red:         #c44d4d;
    --red-soft:    #f1c4c4;
    --green:       #0d6e7a;
    --green-soft:  #b8dde2;
  }

  * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  html, body { background: var(--paper); color: var(--ink); }
  body {
    font-family: 'Heebo', 'Inter', sans-serif;
    font-weight: 400;
    background-image:
      radial-gradient(at 8% 12%,  rgba(168, 51, 122, 0.10) 0px, transparent 55%),
      radial-gradient(at 92% 22%, rgba(91, 48, 145, 0.10) 0px, transparent 55%),
      radial-gradient(at 50% 90%, rgba(13, 110, 122, 0.10) 0px, transparent 60%),
      linear-gradient(135deg, #fef0f7 0%, #f5e8fc 50%, #e6f4f6 100%);
    min-height: 100vh;
    background-attachment: fixed;
  }

  /* Paper grain texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.55'/%3E%3C/svg%3E");
    opacity: 0.035;
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: multiply;
  }

  .font-display { font-family: 'Frank Ruhl Libre', 'Heebo', serif; }
  .font-body { font-family: 'Heebo', 'Inter', sans-serif; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }

  /* Custom scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--paper-warm); }
  ::-webkit-scrollbar-thumb { background: var(--ink-mute); border-radius: 4px; border: 2px solid var(--paper-warm); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-soft); }

  /* Card style: subtle, layered */
  .card-paper {
    background: linear-gradient(180deg, #ffffff 0%, #fbf6fc 100%);
    border: 1px solid rgba(91, 48, 145, 0.08);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.9) inset,
      0 1px 2px rgba(91,48,145,0.05),
      0 4px 12px -2px rgba(91,48,145,0.07),
      0 12px 32px -8px rgba(168,51,122,0.09);
    border-radius: 10px;
    transition: transform 240ms cubic-bezier(.2,.7,.2,1), box-shadow 240ms;
  }
  .card-paper:hover {
    transform: translateY(-2px);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.7) inset,
      0 2px 4px rgba(26,35,50,0.06),
      0 8px 20px -4px rgba(26,35,50,0.1),
      0 24px 48px -16px rgba(26,35,50,0.14);
  }
  .card-flat {
    background: #fdfaf2;
    border: 1px solid rgba(26,35,50,0.08);
    border-radius: 8px;
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 0.5rem;
    padding: 0.55rem 1rem;
    border-radius: 7px;
    font-weight: 500;
    font-size: 0.9rem;
    transition: all 180ms cubic-bezier(.2,.7,.2,1);
    cursor: pointer;
    border: 1px solid transparent;
    white-space: nowrap;
    line-height: 1.2;
  }
  .btn-primary {
    background: linear-gradient(180deg, var(--turq), var(--turq-deep));
    color: #fff;
    box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 2px 4px rgba(7,77,86,0.25), 0 6px 16px -4px rgba(7,77,86,0.35);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 4px 8px rgba(7,77,86,0.3), 0 10px 24px -4px rgba(7,77,86,0.4); }
  .btn-gold {
    background: linear-gradient(180deg, var(--pink), var(--pink-deep));
    color: #fff;
    box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset, 0 2px 4px rgba(125,32,88,0.3);
  }
  .btn-gold:hover { transform: translateY(-1px); filter: brightness(1.08); box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset, 0 4px 10px rgba(125,32,88,0.4); }
  .btn-ghost {
    background: transparent;
    color: var(--ink-soft);
    border-color: rgba(26,35,50,0.12);
  }
  .btn-ghost:hover { background: rgba(26,35,50,0.04); border-color: rgba(26,35,50,0.2); }
  .btn-soft {
    background: var(--paper-warm);
    color: var(--ink);
    border-color: rgba(26,35,50,0.08);
  }
  .btn-soft:hover { background: var(--paper-deeper); }
  .btn-danger {
    background: transparent;
    color: var(--red);
    border-color: rgba(196,77,77,0.3);
  }
  .btn-danger:hover { background: rgba(196,77,77,0.08); border-color: var(--red); }
  .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.82rem; border-radius: 6px; }
  .btn-xs { padding: 0.25rem 0.55rem; font-size: 0.75rem; border-radius: 5px; }
  .btn-icon { padding: 0.45rem; min-width: 2.1rem; }

  /* Inputs */
  .input, .textarea, .select {
    width: 100%;
    background: #fdfbf4;
    border: 1px solid rgba(26,35,50,0.15);
    border-radius: 6px;
    padding: 0.55rem 0.8rem;
    color: var(--ink);
    font-family: inherit;
    font-size: 0.92rem;
    transition: all 160ms;
    direction: rtl;
  }
  .input:focus, .textarea:focus, .select:focus {
    outline: none;
    border-color: var(--pink);
    box-shadow: 0 0 0 3px rgba(168,51,122,0.18);
    background: #fff;
  }
  .textarea { resize: vertical; min-height: 80px; }
  .label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 0.35rem;
    letter-spacing: 0.01em;
  }
  .label-mute { color: var(--ink-mute); font-weight: 500; }

  /* Tags / chips */
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.18rem 0.55rem;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 500;
    background: var(--paper-warm);
    color: var(--ink-soft);
    border: 1px solid rgba(26,35,50,0.06);
  }
  .tag-active { background: var(--turq-soft); color: var(--turq-deep); border-color: rgba(13,110,122,0.35); }
  .tag-inactive { background: #f0e5ed; color: #6b3a5a; border-color: rgba(125,32,88,0.18); }
  .tag-template { background: linear-gradient(135deg, var(--pink-soft), var(--pink)); color: #fff; border-color: rgba(125,32,88,0.5); }
  .tag-gold { background: var(--pink-soft); color: var(--pink-deep); border-color: rgba(168,51,122,0.3); }
  .tag-sage { background: var(--turq-soft); color: var(--turq-deep); border-color: rgba(13,110,122,0.35); }
  .tag-coral { background: var(--purple-soft); color: var(--purple-deep); border-color: rgba(91,48,145,0.35); }
  .tag-teal { background: #b8e0e4; color: #144a52; border-color: rgba(13,110,122,0.4); }
  .tag-plum { background: var(--purple-soft); color: var(--purple-deep); border-color: rgba(91,48,145,0.35); }
  .tag-series { background: linear-gradient(135deg, var(--purple-soft), #e8d5f5); color: var(--purple-deep); border-color: rgba(91,48,145,0.3); }

  /* KPI Pill */
  .kpi {
    background: linear-gradient(160deg, rgba(255,255,255,0.85), rgba(244,205,224,0.35));
    border: 1px solid rgba(168,51,122,0.12);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    backdrop-filter: blur(6px);
    position: relative;
    overflow: hidden;
  }
  .kpi::before {
    content: '';
    position: absolute; top: 0; right: 0; width: 3px; height: 100%;
    background: linear-gradient(180deg, var(--pink), var(--purple));
  }
  .kpi-num {
    font-family: 'Frank Ruhl Libre', serif;
    font-weight: 700;
    font-size: 2.2rem;
    line-height: 1;
    color: var(--pink-deep);
  }
  .kpi-label {
    font-size: 0.78rem;
    color: var(--ink-mute);
    margin-top: 0.35rem;
    letter-spacing: 0.02em;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(26,35,50,0.55);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex; align-items: stretch; justify-content: center;
    animation: fadeIn 200ms ease;
  }
  .modal-panel {
    background: var(--paper);
    width: 100%;
    max-width: 1280px;
    margin: 1.5rem;
    border-radius: 14px;
    box-shadow: 0 30px 80px -10px rgba(0,0,0,0.4);
    border: 1px solid rgba(26,35,50,0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: slideUp 280ms cubic-bezier(.2,.7,.2,1);
  }

  /* Hero header */
  .hero {
    position: relative;
    background:
      radial-gradient(circle at 15% 20%, rgba(168, 51, 122, 0.18) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(91, 48, 145, 0.18) 0%, transparent 45%),
      radial-gradient(circle at 50% 50%, rgba(13, 110, 122, 0.10) 0%, transparent 60%),
      linear-gradient(135deg, #fff2f8 0%, #f3e7fc 50%, #e0f1f4 100%);
    color: var(--ink);
    border-radius: 16px;
    padding: 2rem 2.25rem;
    overflow: hidden;
    border: 1px solid rgba(91, 48, 145, 0.12);
    box-shadow:
      0 1px 3px rgba(91, 48, 145, 0.06),
      0 12px 32px rgba(168, 51, 122, 0.08);
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 260px; height: 260px;
    background: radial-gradient(circle, var(--pink) 0%, transparent 70%);
    opacity: 0.20;
    border-radius: 50%;
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -80px; left: 10%;
    width: 320px; height: 320px;
    background: radial-gradient(circle, var(--purple) 0%, transparent 70%);
    opacity: 0.18;
    border-radius: 50%;
    pointer-events: none;
  }
  .hero-content { position: relative; z-index: 1; }
  .hero-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-weight: 700;
    font-size: 2rem;
    line-height: 1.1;
    margin-bottom: 0.35rem;
    color: var(--ink);
  }
  .hero-sub {
    color: var(--ink-mute);
    font-size: 0.95rem;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0.25rem;
    background: var(--paper-deeper);
    padding: 0.3rem;
    border-radius: 10px;
    border: 1px solid rgba(26,35,50,0.06);
  }
  .tab {
    padding: 0.55rem 1rem;
    border-radius: 7px;
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--ink-mute);
    cursor: pointer;
    transition: all 160ms;
    border: 1px solid transparent;
    background: transparent;
  }
  .tab:hover { color: var(--ink); background: rgba(253,251,244,0.6); }
  .tab-active {
    background: #fff;
    color: var(--turq-deep);
    border-color: rgba(13,110,122,0.25);
    box-shadow: 0 1px 2px rgba(91,48,145,0.08), 0 2px 6px rgba(91,48,145,0.06);
  }

  /* Side tabs (inside builder) */
  .side-tab {
    display: flex; align-items: center; gap: 0.7rem;
    padding: 0.8rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all 160ms;
    border: 1px solid transparent;
    font-weight: 500;
  }
  .side-tab:hover { background: rgba(255,242,248,0.7); }
  .side-tab-active {
    background: linear-gradient(180deg, #fff, #fdeef5);
    border-color: rgba(168,51,122,0.35);
    color: var(--pink-deep);
    box-shadow: 0 1px 2px rgba(125,32,88,0.08);
  }

  /* Toggle */
  .toggle {
    position: relative; display: inline-block;
    width: 38px; height: 22px;
    background: rgba(26,35,50,0.15);
    border-radius: 12px;
    cursor: pointer;
    transition: all 200ms;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; right: 2px;
    width: 18px; height: 18px;
    background: #fff;
    border-radius: 50%;
    transition: all 200ms cubic-bezier(.2,.7,.2,1);
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }
  .toggle-on {
    background: linear-gradient(180deg, var(--gold), var(--gold-deep));
  }
  .toggle-on::after { right: 18px; }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }
  .reveal {
    animation: slideUp 360ms cubic-bezier(.2,.7,.2,1) both;
  }

  /* Decorative ornament */
  .ornament {
    display: flex; align-items: center; gap: 1rem;
    color: var(--ink-mute);
  }
  .ornament::before, .ornament::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--ink-mute), transparent);
    opacity: 0.4;
  }

  /* Template card */
  .tpl-card {
    cursor: pointer;
    padding: 1rem;
    border-radius: 10px;
    border: 1px solid rgba(26,35,50,0.1);
    background: #fdfbf4;
    transition: all 180ms;
    position: relative;
    overflow: hidden;
  }
  .tpl-card:hover {
    border-color: var(--gold);
    background: linear-gradient(180deg, #fff, #fcf5e3);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px -8px rgba(168,132,63,0.3);
  }
  .tpl-card-selected {
    border-color: var(--gold);
    background: linear-gradient(180deg, #fff, #fcf5e3);
    box-shadow: 0 0 0 3px rgba(200,164,100,0.15);
  }

  /* Field row */
  .field-row {
    background: #fdfbf4;
    border: 1px solid rgba(26,35,50,0.1);
    border-radius: 8px;
    padding: 0.9rem;
    transition: all 180ms;
  }
  .field-row:hover { border-color: rgba(200,164,100,0.5); }
  .field-row-active { border-color: var(--gold); background: linear-gradient(180deg, #fff, #fcf7e8); }

  /* Section banner */
  .section-banner {
    background: linear-gradient(135deg, rgba(58,110,122,0.08), rgba(122,139,110,0.06));
    border: 1px solid rgba(58,110,122,0.2);
    border-right: 3px solid var(--teal);
    border-radius: 8px;
    padding: 1rem 1.2rem;
  }

  /* Stat figure */
  .stat-figure {
    font-family: 'Frank Ruhl Libre', serif;
    font-weight: 700;
    color: var(--ink);
  }

  /* Banner */
  .banner-info {
    background: linear-gradient(90deg, rgba(13,110,122,0.12), rgba(13,110,122,0.02));
    border-right: 3px solid var(--turq);
    padding: 0.8rem 1rem;
    border-radius: 6px;
    color: var(--ink);
    font-size: 0.88rem;
    display: flex;
    align-items: flex-start;
    gap: 0.7rem;
  }
  .banner-warn {
    background: linear-gradient(90deg, rgba(168,51,122,0.12), rgba(168,51,122,0.02));
    border-right: 3px solid var(--pink);
    padding: 0.8rem 1rem;
    border-radius: 6px;
    color: var(--ink);
    font-size: 0.88rem;
    display: flex;
    align-items: flex-start;
    gap: 0.7rem;
  }
  .banner-danger {
    background: linear-gradient(90deg, rgba(196,77,77,0.12), rgba(196,77,77,0.02));
    border-right: 3px solid var(--red);
    padding: 0.8rem 1rem;
    border-radius: 6px;
    color: #6b2828;
    font-size: 0.88rem;
    display: flex;
    align-items: flex-start;
    gap: 0.7rem;
  }

  /* Range slider */
  input[type="range"].slider-3d {
    -webkit-appearance: none;
    width: 100%;
    height: 28px;
    background: transparent;
  }
  input[type="range"].slider-3d::-webkit-slider-runnable-track {
    height: 8px;
    background: linear-gradient(90deg, var(--gold-soft), var(--gold), var(--gold-deep));
    border-radius: 4px;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
  }
  input[type="range"].slider-3d::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px; height: 24px;
    margin-top: -8px;
    background: radial-gradient(circle at 30% 30%, #fff, var(--gold) 60%, var(--gold-deep));
    border-radius: 50%;
    border: 2px solid var(--ink);
    box-shadow: 0 2px 6px rgba(0,0,0,0.25), inset 0 1px 2px rgba(255,255,255,0.5);
    cursor: pointer;
  }

  /* QR placeholder */
  .qr-box {
    background: #fff;
    border: 1px solid rgba(26,35,50,0.1);
    border-radius: 6px;
    padding: 4px;
    box-shadow: 0 2px 6px rgba(26,35,50,0.08);
  }

  /* Empty state ornament */
  .empty-illustration {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 4rem;
    color: var(--gold);
    opacity: 0.4;
    text-align: center;
    line-height: 1;
  }

  /* Star rating */
  .star {
    cursor: pointer;
    font-size: 1.5rem;
    transition: all 160ms;
    user-select: none;
  }
  .star-filled { color: var(--gold-deep); transform: scale(1.05); }
  .star-empty { color: rgba(26,35,50,0.2); }
  .star:hover { transform: scale(1.15); }

  /* Likert pill */
  .likert-pill {
    flex: 1;
    padding: 0.55rem 0.5rem;
    text-align: center;

<script>
// Library load diagnostic: if React/Babel/etc. fail to load, show a clear error instead of blank
window.addEventListener('load', function() {
  setTimeout(function() {
    var status = document.getElementById('boot-status');
    if (!status) return; // React already replaced #root content
    var missing = [];
    if (typeof React === 'undefined')       missing.push('React');
    if (typeof ReactDOM === 'undefined')    missing.push('ReactDOM');
    if (typeof Babel === 'undefined')       missing.push('Babel');
    if (typeof XLSX === 'undefined')        missing.push('XLSX (SheetJS)');
    if (typeof QRCode === 'undefined')      missing.push('QRCode');
    if (typeof Recharts === 'undefined')    missing.push('Recharts');
    if (missing.length) {
      document.getElementById('boot-spinner').style.display = 'none';
      document.getElementById('boot-title').textContent = 'בעיית טעינה';
      document.getElementById('boot-title').style.color = '#c44d4d';

        'נסי דפדפן אחר, או רשת אחרת, או בקשי שאעטוף את הספריות בתוך הקובץ.';
    }
  }, 4000);
});

// Catch any uncaught error before React mounts
window.addEventListener('error', function(ev) {
  var status = document.getElementById('boot-status');
  if (!status) return;
  document.getElementById('boot-spinner').style.display = 'none';
  document.getElementById('boot-title').textContent = 'שגיאה בטעינה';

    (ev.message || 'Unknown error') + '<br>' + (ev.filename || '') + ':' + (ev.lineno || '?') +
    '</div>';
});
</script>

const _db = window._fbDb;
const FB_ROOT = 'itc_portal';

const storage = {
  _cache: {},

  async init() {
    if (!_db) return;
    try {
      const snap = await _db.ref(FB_ROOT).once('value');
      const data = snap.val() || {};
      const keys = Object.values(STORAGE_KEYS);
      for (const key of keys) {
        if (data[key] !== undefined) {
          this._cache[key] = data[key];
          try { localStorage.setItem(key, JSON.stringify(data[key])); } catch {}
        }
      }
      console.log('[Firebase] data loaded from cloud');
    } catch (e) {
      console.warn('[Firebase] init read failed — using localStorage', e);
    }
  },

  listen(onChange) {
    if (!_db) return;
    const keys = Object.values(STORAGE_KEYS);
    for (const key of keys) {
      _db.ref(FB_ROOT + '/' + key).on('value', (snap) => {
        const val = snap.val();
        if (val === null) return;
        const prev = JSON.stringify(this._cache[key]);
        const next = JSON.stringify(val);
        if (prev !== next) {
          this._cache[key] = val;
          try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
          if (onChange) onChange(key, val);
        }
      });
    }
  },

  get(key, fallback) {
    if (this._cache[key] !== undefined) return this._cache[key];
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch(e) { return fallback; }
  },

  set(key, value) {
    try {
      this._cache[key] = value;
      localStorage.setItem(key, JSON.stringify(value));
      if (_db) _db.ref(FB_ROOT + '/' + key).set(value).catch(e => console.warn('[Firebase] write failed', e));
      return true;
    } catch(e) { console.warn('storage set failed', e); return false; }
  },
};

const formatDate = (iso) => {

};

const formatDateTime = (iso) => {
  if (!iso) return '';

  return d.toLocaleString('he-IL', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
};

// Statistics helpers
const stats = {
  mean(arr) {
    const a = arr.filter(x => typeof x === 'number' && !isNaN(x));
    if (!a.length) return 0;
    return a.reduce((s,x) => s+x, 0) / a.length;
  },
  median(arr) {
    const a = arr.filter(x => typeof x === 'number' && !isNaN(x)).sort((x,y) => x-y);
    if (!a.length) return 0;
    const m = Math.floor(a.length / 2);
    return a.length % 2 ? a[m] : (a[m-1] + a[m]) / 2;
  },
  std(arr) {
    const a = arr.filter(x => typeof x === 'number' && !isNaN(x));
    if (a.length < 2) return 0;
    const m = stats.mean(a);
    return Math.sqrt(a.reduce((s,x) => s + (x-m)**2, 0) / (a.length - 1));
  },
  min(arr) { const a = arr.filter(x => typeof x === 'number'); return a.length ? Math.min(...a) : 0; },
  max(arr) { const a = arr.filter(x => typeof x === 'number'); return a.length ? Math.max(...a) : 0; },
  count(arr) { return arr.filter(x => x !== null && x !== undefined && x !== '').length; },
};

// Shorthand aliases — dashboard components call these directly (without stats. prefix)
const mean   = (arr) => stats.mean(arr);
const median = (arr) => stats.median(arr);
const std    = (arr) => stats.std(arr);
const min    = (arr) => stats.min(arr);
const max    = (arr) => stats.max(arr);

// Field validation
const validateField = (field, value) => {
  // Empty check
  const isEmpty = value === null || value === undefined || value === '' ||
                  (Array.isArray(value) && value.length === 0);
  if (field.required && isEmpty) return 'שדה חובה';
  if (isEmpty) return null;

  if (field.type === 'number') {
    const cfg = field.numberConfig || {};
    let n;
    if (cfg.format === 'percent') {
      const str = String(value).replace('%','').trim();
      n = parseFloat(str);
      if (isNaN(n)) return 'יש להזין מספר תקין';
      if (n < 0 || n > 100) return 'אחוזים בטווח 0–100';
    } else if (cfg.format === 'fraction') {
      const m = String(value).match(/^(-?\d+)\/(\d+)$/);
      if (!m) return 'יש להזין שבר בפורמט a/b';
      if (parseInt(m[2]) === 0) return 'אסור לחלק באפס';
      n = parseInt(m[1]) / parseInt(m[2]);
    } else if (cfg.format === 'integer') {
      n = parseInt(String(value), 10);
      if (isNaN(n) || String(n) !== String(value).trim()) return 'יש להזין מספר שלם';
    } else {
      n = parseFloat(String(value));
      if (isNaN(n)) return 'יש להזין מספר תקין';
    }
    if (cfg.min !== undefined && cfg.min !== null && n < cfg.min) return `הערך חייב להיות לפחות ${cfg.min}`;
    if (cfg.max !== undefined && cfg.max !== null && n > cfg.max) return `הערך חייב להיות לכל היותר ${cfg.max}`;
    if (cfg.maxDigits && String(Math.abs(Math.trunc(n))).length > cfg.maxDigits) return `עד ${cfg.maxDigits} ספרות`;
  }
  if (field.type === 'text') {
    const cfg = field.textConfig || {};
    const s = String(value);
    if (cfg.minLength && s.length < cfg.minLength) return `לפחות ${cfg.minLength} תווים`;
    if (cfg.maxLength && s.length > cfg.maxLength) return `לכל היותר ${cfg.maxLength} תווים`;
    if (cfg.format && cfg.format !== 'free' && cfg.format !== 'custom') {
      const tf = TEXT_FORMATS.find(t => t.id === cfg.format);
      if (tf?.pattern) {
        try {
          const re = new RegExp(tf.pattern, 'u');
          if (!re.test(s)) return 'הפורמט אינו תקין';
        } catch(e) {}
      }
    }
    if (cfg.format === 'custom' && cfg.regex) {
      try {
        const re = new RegExp(cfg.regex, 'u');
        if (!re.test(s)) return 'הערך אינו תואם לתבנית הנדרשת';
      } catch(e) {}
    }
  }
  if (field.type === 'date') {
    const cfg = field.dateConfig || {};
    const d = new Date(value);
    if (isNaN(d.getTime())) return 'תאריך לא תקין';
    if (cfg.min && new Date(cfg.min) > d) return `התאריך חייב להיות אחרי ${formatDate(cfg.min)}`;
    if (cfg.max && new Date(cfg.max) < d) return `התאריך חייב להיות לפני ${formatDate(cfg.max)}`;
  }
  if (field.type === 'multi') {
    const cfg = field.multiConfig || {};
    const arr = Array.isArray(value) ? value : [];
    if (cfg.minSelections && arr.length < cfg.minSelections) return `יש לבחור לפחות ${cfg.minSelections}`;
    if (cfg.maxSelections && arr.length > cfg.maxSelections) return `ניתן לבחור עד ${cfg.maxSelections}`;
  }
  return null;
};

// Skip-logic evaluator: returns true if field should be HIDDEN
const isHidden = (cond, answers, allFields) => {
  if (!cond || !cond.fieldId) return false;
  const v = answers[cond.fieldId];
  const cv = cond.value;
  switch (cond.op) {
    case 'eq':        return String(v) === String(cv);
    case 'neq':       return String(v) !== String(cv);
    case 'includes':  return Array.isArray(v) ? v.includes(cv) : String(v||'').includes(String(cv));
    case 'not_includes': return Array.isArray(v) ? !v.includes(cv) : !String(v||'').includes(String(cv));
    case 'any_of':    return Array.isArray(cv) && (Array.isArray(v) ? v.some(x=>cv.includes(x)) : cv.includes(v));
    case 'none_of':   return Array.isArray(cv) && (Array.isArray(v) ? !v.some(x=>cv.includes(x)) : !cv.includes(v));
    case 'gt':        return parseFloat(v) > parseFloat(cv);
    case 'lt':        return parseFloat(v) < parseFloat(cv);
    case 'gte':       return parseFloat(v) >= parseFloat(cv);
    case 'lte':       return parseFloat(v) <= parseFloat(cv);
    case 'empty':     return v === undefined || v === null || v === '' || (Array.isArray(v) && v.length===0);
    case 'not_empty': return !(v === undefined || v === null || v === '' || (Array.isArray(v) && v.length===0));
    default: return false;
  }
};

// Determine if a field is visible given current answers
const isFieldVisible = (field, answers, mode='skip') => {
  // mode === 'skip' means skipIf conditions hide if any match
  // mode === 'reveal' means revealIf — show only if all match
  const skipIfs = field.skipIf || [];
  const revealIfs = field.revealIf || [];
  if (skipIfs.length > 0 && skipIfs.some(c => isHidden(c, answers))) return false;
  if (revealIfs.length > 0 && !revealIfs.every(c => isHidden(c, answers))) return false;
  return true;
};

// Determine if a section is visible
const isSectionVisible = (section, answers) => {
  const skipIfs = section.skipIf || [];
  const showIfs = section.showIf || [];
  if (skipIfs.length > 0 && skipIfs.some(c => isHidden(c, answers))) return false;
  if (showIfs.length > 0 && !showIfs.every(c => isHidden(c, answers))) return false;
  return true;
};

// Flatten sections to fields (legacy support)
const flattenFields = (form) => {
  if (!form.sections) return form.fields || [];
  return form.sections.flatMap(s => s.fields || []);
};

// Render a QR code into a DOM node
const makeQR = (node, text, size=80) => {
  if (!node) return;
  node.innerHTML = '';
  try {
    new QRCode(node, { text, width: size, height: size, colorDark: '#0d6e7a', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
  } catch(e) { console.warn('qr error', e); }
};

// Download blob
const downloadBlob = (blob, filename) => {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
};

    <div className="modal-backdrop" onClick={(e) => { if (e.target.classList.contains('modal-backdrop')) onClose?.(); }}>

  );
};

function FieldValidationEditor({ field, onChange }) {
  const update = (patch) => onChange({ ...field, ...patch });

  if (field.type === 'number') {
    const cfg = field.numberConfig || { format: 'integer' };
    const setCfg = (patch) => update({ numberConfig: { ...cfg, ...patch } });
    return (
      <div className="grid grid-cols-2 gap-3">
        <Field label="פורמט מספר">
          <select className="select" value={cfg.format || 'integer'} onChange={e => setCfg({ format: e.target.value })}>
            {NUMBER_FORMATS.map(f => <option key={f.id} value={f.id}>{f.label} (לדוגמה: {f.example})</option>)}
          </select>
        </Field>
        <Field label="כמות ספרות מקסימלית">
          <input type="number" className="input" min="0" max="20"
                 value={cfg.maxDigits || ''} placeholder="ללא הגבלה"
                 onChange={e => setCfg({ maxDigits: e.target.value ? parseInt(e.target.value) : undefined })} />
        </Field>
        <Field label="ערך מינימלי">
          <input type="number" className="input" value={cfg.min ?? ''} placeholder="ללא"
                 onChange={e => setCfg({ min: e.target.value === '' ? undefined : parseFloat(e.target.value) })} />
        </Field>
        <Field label="ערך מקסימלי">
          <input type="number" className="input" value={cfg.max ?? ''} placeholder="ללא"
                 onChange={e => setCfg({ max: e.target.value === '' ? undefined : parseFloat(e.target.value) })} />
        </Field>
        <div className="col-span-2 flex items-center gap-4">
          <Toggle checked={!!cfg.allowNegative} onChange={v => setCfg({ allowNegative: v })} label="לאפשר מספרים שליליים" />
          <Toggle checked={!!cfg.showSlider} onChange={v => setCfg({ showSlider: v })} label="להציג סליידר בעת המילוי" />
        </div>
      </div>
    );
  }

  if (field.type === 'date') {
    const cfg = field.dateConfig || { format: 'date' };
    const setCfg = (patch) => update({ dateConfig: { ...cfg, ...patch } });
    return (
      <div className="grid grid-cols-2 gap-3">
        <Field label="סוג בחירה">
          <select className="select" value={cfg.format || 'date'} onChange={e => setCfg({ format: e.target.value })}>
            {DATE_FORMATS.map(f => <option key={f.id} value={f.id}>{f.label} (לדוגמה: {f.example})</option>)}
          </select>
        </Field>
        <Field label="כיוון בחירה">
          <select className="select" value={cfg.direction || 'any'} onChange={e => setCfg({ direction: e.target.value })}>
            <option value="any">כל תאריך</option>
            <option value="past">רק עבר</option>
            <option value="future">רק עתיד</option>
            <option value="today">היום בלבד</option>
          </select>
        </Field>
        <Field label="תאריך מינימלי">
          <input type="date" className="input" value={cfg.min || ''} onChange={e => setCfg({ min: e.target.value || undefined })} />
        </Field>
        <Field label="תאריך מקסימלי">
          <input type="date" className="input" value={cfg.max || ''} onChange={e => setCfg({ max: e.target.value || undefined })} />
        </Field>
        <div className="col-span-2">
          <Toggle checked={!!cfg.weekdaysOnly} onChange={v => setCfg({ weekdaysOnly: v })} label="ימי חול בלבד (ראשון–חמישי)" />
        </div>
      </div>
    );
  }

  if (field.type === 'text') {
    const cfg = field.textConfig || { format: 'free' };
    const setCfg = (patch) => update({ textConfig: { ...cfg, ...patch } });
    return (
      <div className="grid grid-cols-2 gap-3">
        <Field label="פורמט טקסט">
          <select className="select" value={cfg.format || 'free'} onChange={e => setCfg({ format: e.target.value })}>
            {TEXT_FORMATS.map(f => <option key={f.id} value={f.id}>{f.label}</option>)}
          </select>
        </Field>
        <Field label="אורך מינימלי">
          <input type="number" className="input" min="0" value={cfg.minLength || ''}
                 onChange={e => setCfg({ minLength: e.target.value ? parseInt(e.target.value) : undefined })} placeholder="ללא"/>
        </Field>
        <Field label="אורך מקסימלי">
          <input type="number" className="input" min="0" value={cfg.maxLength || ''}
                 onChange={e => setCfg({ maxLength: e.target.value ? parseInt(e.target.value) : undefined })} placeholder="ללא"/>
        </Field>
        <Field label="כמות שורות (אם רב-שורתי)">
          <input type="number" className="input" min="1" max="20" value={cfg.rows || 3}
                 onChange={e => setCfg({ rows: parseInt(e.target.value) || 3 })} />
        </Field>
        <div className="col-span-2 flex items-center gap-4 flex-wrap">
          <Toggle checked={!!cfg.multiline} onChange={v => setCfg({ multiline: v })} label="טקסט רב-שורתי" />
          <Toggle checked={!!cfg.showCounter} onChange={v => setCfg({ showCounter: v })} label="להציג מונה תווים" />
        </div>
        {cfg.format === 'custom' && (
          <Field label="תבנית Regex מותאמת">
            <input className="input font-mono" placeholder="לדוגמה: ^[A-Za-z0-9]+$"
                   value={cfg.regex || ''} onChange={e => setCfg({ regex: e.target.value })} />
          </Field>
        )}
      </div>
    );
  }

  if (field.type === 'rating') {
    return (
      <div className="grid grid-cols-2 gap-3">
        <Field label="ערך מקסימלי לדירוג">
          <input type="number" className="input" min="2" max="20" value={field.max || 10}
                 onChange={e => update({ max: parseInt(e.target.value) || 10 })} />
        </Field>
        <Field label="סגנון תצוגה">
          <select className="select" value={field.ratingStyle || 'stars'} onChange={e => update({ ratingStyle: e.target.value })}>
            <option value="stars">⭐ כוכבים</option>

            <option value="hearts">❤️ לבבות</option>
          </select>
        </Field>
      </div>
    );
  }

  if (field.type === 'likert') {
    return (
      <div className="grid grid-cols-2 gap-3">
        <Field label="מספר נקודות בסולם">
          <select className="select" value={field.max || 5} onChange={e => update({ max: parseInt(e.target.value) })}>
            <option value="3">3 נקודות</option>
            <option value="4">4 נקודות (בלי אמצע)</option>
            <option value="5">5 נקודות</option>
            <option value="7">7 נקודות</option>
            <option value="10">10 נקודות</option>
          </select>
        </Field>
        <Field label="תוויות (אופציונלי)" hint="טקסט קצה ימני | טקסט קצה שמאלי">
          <input className="input" value={field.likertLabels || ''} placeholder="לדוגמה: בכלל לא | מאוד"
                 onChange={e => update({ likertLabels: e.target.value })} />
        </Field>
      </div>
    );
  }

  if (field.type === 'multi') {
    const cfg = field.multiConfig || {};
    const setCfg = (patch) => update({ multiConfig: { ...cfg, ...patch } });
    return (
      <div className="grid grid-cols-2 gap-3">
        <Field label="מינימום בחירות">
          <input type="number" className="input" min="0" value={cfg.minSelections || ''} placeholder="ללא"
                 onChange={e => setCfg({ minSelections: e.target.value ? parseInt(e.target.value) : undefined })} />
        </Field>
        <Field label="מקסימום בחירות">
          <input type="number" className="input" min="0" value={cfg.maxSelections || ''} placeholder="ללא"
                 onChange={e => setCfg({ maxSelections: e.target.value ? parseInt(e.target.value) : undefined })} />
        </Field>
        <div className="col-span-2">
          <Toggle checked={!!cfg.allowOther} onChange={v => setCfg({ allowOther: v })}
                  label="לאפשר אופציית 'אחר' עם תיבת טקסט" />
        </div>
      </div>
    );
  }

  if (field.type === 'slider') {
    const cfg = field.sliderConfig || { min: 0, max: 10, step: 1, leftLabel: '', rightLabel: '' };
    const setCfg = (patch) => update({ sliderConfig: { ...cfg, ...patch } });
    return (
      <div className="grid grid-cols-2 gap-3">
        <Field label="ערך מינימלי"><input type="number" className="input" value={cfg.min} onChange={e => setCfg({ min: parseFloat(e.target.value) })} /></Field>
        <Field label="ערך מקסימלי"><input type="number" className="input" value={cfg.max} onChange={e => setCfg({ max: parseFloat(e.target.value) })} /></Field>
        <Field label="צעד"><input type="number" className="input" step="0.1" min="0.01" value={cfg.step} onChange={e => setCfg({ step: parseFloat(e.target.value) })} /></Field>
        <Field label="כמות נקודות עצירה (אופציונלי)">
          <select className="select" value={cfg.snapPoints || ''} onChange={e => setCfg({ snapPoints: e.target.value ? parseInt(e.target.value) : undefined })}>
            <option value="">ללא — סליידר רציף</option>
            <option value="3">3 נקודות עצירה</option>
            <option value="5">5 נקודות עצירה</option>
            <option value="7">7 נקודות עצירה</option>
            <option value="10">10 נקודות עצירה</option>

        </Field>
        <Field label="תווית ימנית" hint="ערך התחלתי"><input className="input" value={cfg.leftLabel || ''} onChange={e => setCfg({ leftLabel: e.target.value })} /></Field>
        <Field label="תווית שמאלית" hint="ערך סופי"><input className="input" value={cfg.rightLabel || ''} onChange={e => setCfg({ rightLabel: e.target.value })} /></Field>
      </div>

  }

  return null;
}

/* ===========================================================================
 * §5  SKIP LOGIC EDITOR (for fields AND sections)
 * ========================================================================== */

function SkipLogicEditor({ conditions, onChange, allFields, label, helpText, kind='skipIf' }) {
  const conds = conditions || [];
  const addCond = () => {
    const firstField = allFields.find(f => f.type !== 'text' && f.type !== 'date');
    onChange([...conds, {
      id: uuid('cond'),
      fieldId: firstField?.id || '',
      op: 'eq',
      value: '',
    }]);
  };
  const updateCond = (idx, patch) => {
    const next = [...conds];
    next[idx] = { ...next[idx], ...patch };
    onChange(next);
  };
  const remove = (idx) => onChange(conds.filter((_,i) => i !== idx));

  return (
    <div className="space-y-2">
      <div className="flex items-center justify-between">
        <div>
          <div className="text-sm font-semibold text-[var(--ink)]">{label}</div>
          {helpText && <div className="text-xs text-[var(--ink-mute)] mt-0.5">{helpText}</div>}
        </div>
        <Btn variant="ghost" size="sm" icon="+" onClick={addCond}>הוסף תנאי</Btn>
      </div>
      {conds.length === 0 && (
        <div className="text-xs text-[var(--ink-mute)] italic">ללא תנאים — {kind === 'skipIf' ? 'יוצג תמיד' : 'יוצג ללא תנאי'}</div>
      )}
      {conds.map((c, idx) => {
        const refField = allFields.find(f => f.id === c.fieldId);
        return (
          <div key={c.id} className="card-flat p-2.5 space-y-2">
            <div className="flex items-center gap-2 flex-wrap">
              {idx > 0 && <span className="text-xs font-bold text-[var(--gold-deep)]">וגם</span>}
              <span className="text-xs text-[var(--ink-mute)]">אם תשובת</span>
              <select className="select" style={{ width: 'auto', minWidth: '180px' }}
                      value={c.fieldId} onChange={e => updateCond(idx, { fieldId: e.target.value })}>
                <option value="">— בחר שדה —</option>
                {allFields.map(f => <option key={f.id} value={f.id}>{f.label || '(ללא תווית)'}</option>)}
              </select>
              <select className="select" style={{ width: 'auto', minWidth: '110px' }}
                      value={c.op} onChange={e => updateCond(idx, { op: e.target.value })}>
                {SKIP_OPERATORS.map(o => <option key={o.id} value={o.id}>{o.label}</option>)}
              </select>
              {c.op !== 'empty' && c.op !== 'not_empty' && (
                refField && ['single','multi','likert','yesno','image','ranking'].includes(refField.type) ? (
                  <select className="select" style={{ width: 'auto', minWidth: '140px' }}
                          value={c.value} onChange={e => updateCond(idx, { value: e.target.value })}>
                    <option value="">— ערך —</option>
                    {(refField.type === 'yesno' ? ['כן','לא'] : (refField.type === 'likert'
                       ? Array.from({length: refField.max || 5}, (_,i) => String(i+1))
                       : refField.options || [])
                    ).map(o => <option key={o} value={o}>{o}</option>)}
                  </select>
                ) : (
                  <input className="input" style={{ width: 'auto', minWidth: '140px' }}
                         placeholder="ערך" value={c.value || ''} onChange={e => updateCond(idx, { value: e.target.value })} />
                )
              )}
              <IconBtn icon="✕" danger onClick={() => remove(idx)} title="הסר תנאי" />
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ===========================================================================
 * §6  SECTION MANAGER
 * ========================================================================== */

function SectionsBuilder({ form, setForm }) {
  const sections = form.sections || [{ id: uuid('sec'), name: 'סעיף ראשי', desc: '', fields: [] }];
  const [activeSecIdx, setActiveSecIdx] = useState(0);
  const [editingFieldId, setEditingFieldId] = useState(null);

  // ensure sections array exists in form
  useEffect(() => {
    if (!form.sections || form.sections.length === 0) {
      setForm({ ...form, sections: [{ id: uuid('sec'), name: 'סעיף ראשי', desc: '', fields: [] }] });
    }
  }, []);

  const updateSection = (idx, patch) => {
    const next = [...sections];
    next[idx] = { ...next[idx], ...patch };
    setForm({ ...form, sections: next });
  };
  const addSection = () => {
    const next = [...sections, { id: uuid('sec'), name: `סעיף ${sections.length + 1}`, desc: '', fields: [] }];
    setForm({ ...form, sections: next });
    setActiveSecIdx(next.length - 1);
  };
  const removeSection = (idx) => {
    if (sections.length === 1) { alert('צריך לפחות סעיף אחד'); return; }
    const next = sections.filter((_,i) => i !== idx);
    setForm({ ...form, sections: next });
    setActiveSecIdx(Math.min(idx, next.length - 1));
  };
  const moveSection = (idx, dir) => {
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= sections.length) return;
    const next = [...sections];
    [next[idx], next[newIdx]] = [next[newIdx], next[idx]];
    setForm({ ...form, sections: next });
    setActiveSecIdx(newIdx);
  };

  // Field operations within active section
  const sec = sections[activeSecIdx] || sections[0];
  const allFieldsFlat = sections.flatMap(s => s.fields || []);

  const addField = (type='text') => {
    const ft = FIELD_TYPES.find(f => f.id === type);
    const newField = {
      id: uuid('f'),
      type, label: '',
      required: false,
      options: ['single','multi','ranking','image'].includes(type) ? ['אפשרות א׳','אפשרות ב׳'] : undefined,
      max: type === 'rating' ? 10 : type === 'likert' ? 5 : undefined,
      skipIf: [],
    };
    updateSection(activeSecIdx, { fields: [...(sec.fields || []), newField] });
    setEditingFieldId(newField.id);
  };

  const updateField = (fieldId, newField) => {
    const fields = (sec.fields || []).map(f => f.id === fieldId ? newField : f);
    updateSection(activeSecIdx, { fields });
  };
  const removeField = (fieldId) => {
    const fields = (sec.fields || []).filter(f => f.id !== fieldId);
    updateSection(activeSecIdx, { fields });
  };
  const moveField = (fieldId, dir) => {
    const fields = [...(sec.fields || [])];
    const idx = fields.findIndex(f => f.id === fieldId);
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= fields.length) return;
    [fields[idx], fields[newIdx]] = [fields[newIdx], fields[idx]];
    updateSection(activeSecIdx, { fields });
  };
  const duplicateField = (fieldId) => {
    const fields = [...(sec.fields || [])];
    const idx = fields.findIndex(f => f.id === fieldId);
    const dup = JSON.parse(JSON.stringify(fields[idx]));
    dup.id = uuid('f');
    dup.label = (dup.label || '') + ' (עותק)';
    fields.splice(idx + 1, 0, dup);
    updateSection(activeSecIdx, { fields });
  };

  return (
    <div className="grid grid-cols-12 gap-4 h-full">
      {/* Sections list */}
      <div className="col-span-3 space-y-2">
        <div className="flex items-center justify-between mb-2">
          <h4 className="font-display font-bold text-base">סעיפי השאלון</h4>
          <Btn size="xs" variant="gold" icon="+" onClick={addSection}>סעיף</Btn>
        </div>
        <div className="space-y-1.5">
          {sections.map((s, idx) => (
            <div key={s.id}
                 onClick={() => setActiveSecIdx(idx)}
                 className={`p-2.5 rounded-lg cursor-pointer transition border ${idx === activeSecIdx ? 'bg-white border-[var(--gold)] shadow-sm' : 'border-transparent hover:bg-white/60'}`}>
              <div className="flex items-start gap-2">
                <span className="w-6 h-6 rounded-full bg-[var(--paper-deeper)] text-xs flex items-center justify-center font-bold flex-shrink-0">{idx + 1}</span>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium truncate">{s.name || `סעיף ${idx+1}`}</div>
                  <div className="text-xs text-[var(--ink-mute)] mt-0.5">{(s.fields || []).length} שדות</div>
                  {(s.skipIf || s.showIf) && ((s.skipIf || []).length > 0 || (s.showIf || []).length > 0) && (
                    <div className="text-[10px] text-[var(--gold-deep)] mt-0.5">⚡ עם תנאים</div>
                  )}
                </div>
                {idx === activeSecIdx && (
                  <div className="flex flex-col gap-0.5">
                    <button className="text-[var(--ink-mute)] hover:text-[var(--ink)] text-xs" onClick={(e) => { e.stopPropagation(); moveSection(idx, -1); }}>▲</button>
                    <button className="text-[var(--ink-mute)] hover:text-[var(--ink)] text-xs" onClick={(e) => { e.stopPropagation(); moveSection(idx, 1); }}>▼</button>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
        <Ornament>סך הכל {sections.length} סעיפים</Ornament>
        <div className="text-xs text-[var(--ink-mute)] leading-relaxed">
          💡 כל סעיף יוצג בעמוד נפרד בעת המילוי. ניתן להגדיר תנאים שיגרמו לדילוג על סעיף או להצגתו רק אם תנאי מתקיים.
        </div>
      </div>

      {/* Active section editor */}
      <div className="col-span-9 space-y-4">
        <div className="section-banner">
          <div className="flex items-start justify-between gap-3 mb-3">
            <div className="flex-1">
              <Field label="שם הסעיף">
                <input className="input" value={sec.name || ''} placeholder="לדוגמה: פרטים אישיים"
                       onChange={e => updateSection(activeSecIdx, { name: e.target.value })} />
              </Field>
            </div>
            {sections.length > 1 && (
              <IconBtn icon="🗑" danger title="הסר סעיף זה" onClick={() => removeSection(activeSecIdx)} />
            )}
          </div>
          <Field label="תיאור / הסבר לסעיף" hint="יוצג בראש העמוד בעת המילוי">
            <textarea className="textarea" rows="2" value={sec.desc || ''}
                      placeholder="הקדמה קצרה שתעזור למשיב להבין על מה הסעיף"
                      onChange={e => updateSection(activeSecIdx, { desc: e.target.value })} />
          </Field>
          <details className="mt-3">
            <summary className="cursor-pointer text-sm font-semibold text-[var(--teal)] hover:text-[var(--ink)]">
              ⚡ תנאי הצגה/דילוג של הסעיף
            </summary>
            <div className="mt-3 space-y-3 pr-3 border-r-2 border-[var(--teal)]/30">
              <SkipLogicEditor
                conditions={sec.skipIf || []}
                onChange={(arr) => updateSection(activeSecIdx, { skipIf: arr })}
                allFields={allFieldsFlat.filter(f => !sec.fields?.some(sf => sf.id === f.id))}
                label="דלג על הסעיף (Skip If)"
                helpText="אם תנאי כלשהו מתקיים — דלג על כל הסעיף הזה"
                kind="skipIf"
              />
              <SkipLogicEditor
                conditions={sec.showIf || []}
                onChange={(arr) => updateSection(activeSecIdx, { showIf: arr })}
                allFields={allFieldsFlat.filter(f => !sec.fields?.some(sf => sf.id === f.id))}
                label="הצג את הסעיף רק אם (Show If)"
                helpText="הסעיף יוצג רק אם כל התנאים מתקיימים"
                kind="showIf"
              />
            </div>
          </details>
        </div>

        {/* Field list of the section */}
        <div>
          <div className="flex items-center justify-between mb-3">
            <h4 className="font-display font-bold text-lg">שדות הסעיף</h4>
            <div className="flex gap-1.5">
              {FIELD_TYPES.slice(0,6).map(ft => (
                <button key={ft.id} title={ft.label} onClick={() => addField(ft.id)}
                        className="w-8 h-8 rounded-lg border border-[var(--ink)]/10 bg-white hover:bg-[var(--paper-warm)] text-base transition">
                  {ft.icon}
                </button>
              ))}
              <select onChange={e => { if (e.target.value) { addField(e.target.value); e.target.value=''; } }}
                      className="select text-sm" style={{width:'auto'}} value="">
                <option value="">+ עוד סוג…</option>
                {FIELD_TYPES.slice(6).map(ft => <option key={ft.id} value={ft.id}>{ft.icon} {ft.label}</option>)}
              </select>
            </div>
          </div>

          {(!sec.fields || sec.fields.length === 0) && (
            <div className="card-flat p-10 text-center">
              <div className="empty-illustration">𝓢</div>
              <div className="mt-3 text-[var(--ink-mute)]">עוד אין שדות בסעיף זה.</div>
              <div className="text-xs text-[var(--ink-mute)] mt-1">בחר סוג שדה מהסרגל למעלה כדי להתחיל</div>
            </div>
          )}

          <div className="space-y-2">
            {(sec.fields || []).map((field, idx) => (
              <FieldRow key={field.id}
                        field={field}
                        idx={idx}
                        total={sec.fields.length}
                        allFields={allFieldsFlat.filter(f => f.id !== field.id)}
                        isEditing={editingFieldId === field.id}
                        onToggleEdit={() => setEditingFieldId(editingFieldId === field.id ? null : field.id)}
                        onUpdate={(nf) => updateField(field.id, nf)}
                        onRemove={() => removeField(field.id)}
                        onMove={(dir) => moveField(field.id, dir)}
                        onDuplicate={() => duplicateField(field.id)} />
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function FieldRow({ field, idx, total, allFields, isEditing, onToggleEdit, onUpdate, onRemove, onMove, onDuplicate }) {
  const ft = FIELD_TYPES.find(f => f.id === field.type);
  const hasOptions = ['single','multi','ranking','image'].includes(field.type);
  return (
    <div className={`field-row ${isEditing ? 'field-row-active' : ''}`}>
      <div className="flex items-center gap-3">
        <span className="text-2xl flex-shrink-0">{ft?.icon || '📋'}</span>
        <div className="flex-1 min-w-0">
          <div className="text-sm font-medium text-[var(--ink)] truncate">
            {field.label || <span className="italic text-[var(--ink-mute)]">ללא תווית</span>}
            {field.required && <span className="text-[var(--red)] mr-1">*</span>}
          </div>
          <div className="text-xs text-[var(--ink-mute)] mt-0.5 flex items-center gap-2 flex-wrap">
            <span>{ft?.label}</span>
            {(field.skipIf || []).length > 0 && <span className="text-[var(--gold-deep)]">⚡ {field.skipIf.length} תנאים</span>}
            {field.type === 'number' && field.numberConfig?.format && (
              <Pill variant="teal">{NUMBER_FORMATS.find(f => f.id === field.numberConfig.format)?.label}</Pill>
            )}
            {field.type === 'date' && field.dateConfig?.format && (
              <Pill variant="teal">{DATE_FORMATS.find(f => f.id === field.dateConfig.format)?.label}</Pill>
            )}
            {field.type === 'text' && field.textConfig?.format && field.textConfig.format !== 'free' && (
              <Pill variant="teal">{TEXT_FORMATS.find(f => f.id === field.textConfig.format)?.label}</Pill>
            )}
          </div>
        </div>
        <div className="flex items-center gap-1">
          <button title="הזז למעלה" disabled={idx === 0} onClick={() => onMove(-1)}
                  className="w-7 h-7 rounded text-[var(--ink-mute)] hover:bg-[var(--paper-warm)] disabled:opacity-30">▲</button>
          <button title="הזז למטה" disabled={idx === total - 1} onClick={() => onMove(1)}
                  className="w-7 h-7 rounded text-[var(--ink-mute)] hover:bg-[var(--paper-warm)] disabled:opacity-30">▼</button>
          <button title="שכפל" onClick={onDuplicate}
                  className="w-7 h-7 rounded text-[var(--ink-mute)] hover:bg-[var(--paper-warm)]">📋</button>
          <IconBtn icon={isEditing ? '✕' : '✏️'} onClick={onToggleEdit} title={isEditing ? 'סגור' : 'ערוך'} />
          <IconBtn icon="🗑" danger onClick={onRemove} title="הסר" />
        </div>
      </div>

      {isEditing && (
        <div className="mt-4 pt-4 border-t border-[var(--ink)]/10 space-y-4 reveal">
          <div className="grid grid-cols-2 gap-3">
            <Field label="תווית השאלה" required>
              <input className="input" value={field.label || ''} placeholder="כתוב את השאלה כאן…"
                     onChange={e => onUpdate({ ...field, label: e.target.value })} />
            </Field>
            <Field label="סוג שדה">
              <select className="select" value={field.type} onChange={e => onUpdate({ ...field, type: e.target.value })}>
                {FIELD_TYPES.map(t => <option key={t.id} value={t.id}>{t.icon} {t.label}</option>)}
              </select>
            </Field>
          </div>
          <Field label="טקסט עזר / רמז" hint="יוצג מתחת לשאלה בקטן">
            <input className="input" value={field.helperText || ''} onChange={e => onUpdate({ ...field, helperText: e.target.value })}
                   placeholder="לדוגמה: בחר את התשובה המתאימה ביותר עבורך" />
          </Field>
          <div className="flex items-center gap-6 flex-wrap">
            <Toggle checked={!!field.required} onChange={v => onUpdate({ ...field, required: v })} label="שדה חובה" />
            <Toggle checked={!!field.isRDOnly} onChange={v => onUpdate({ ...field, isRDOnly: v })} label="שדה R&D בלבד (נעול)" />
            {(field.type === 'likert' || field.type === 'single' || field.type === 'rating' || field.type === 'yesno') && (
              <Toggle checked={!!field.computePositive} onChange={v => onUpdate({ ...field, computePositive: v })} label='חישוב "% חיובי"' />
            )}
          </div>

          {hasOptions && (
            <div className="card-flat p-3">
              <div className="text-sm font-semibold mb-2 text-[var(--ink)]">אפשרויות תשובה</div>
              <OptionsEditor field={field} onChange={onUpdate} />
            </div>
          )}

          <div className="card-flat p-3">
            <div className="text-sm font-semibold mb-3 text-[var(--ink)]">⚙️ הגדרות ותנאי ולידציה</div>
            <FieldValidationEditor field={field} onChange={onUpdate} />
          </div>

          <details className="card-flat p-3" open={(field.skipIf || []).length > 0}>
            <summary className="cursor-pointer text-sm font-semibold text-[var(--gold-deep)]">
              ⚡ תנאי הצגה — Skip Logic
            </summary>
            <div className="mt-3">
              <SkipLogicEditor
                conditions={field.skipIf || []}
                onChange={(arr) => onUpdate({ ...field, skipIf: arr })}
                allFields={allFields}
                label="הסתר את השדה אם:"
                helpText="אם תנאי כלשהו מתקיים — השדה לא יוצג למשיב"
              />
            </div>
          </details>
        </div>
      )}
    </div>
  );
}

/* ===========================================================================
 * §7  FORM BUILDER (4 inner tabs: Fields, Audience, Translation, Settings)
 * ========================================================================== */

function FormBuilder({ initialForm, onClose, onSave, userTemplates, onToast }) {
  const [step, setStep] = useState(initialForm.id ? 'build' : 'template'); // 'template' | 'build'
  const [form, setForm] = useState(() => initialForm.id ? initialForm : {
    id: uuid('eval'),
    title: '', description: '',
    icon: '📋',
    sourceLang: 'he',
    sections: [{ id: uuid('sec'), name: 'סעיף ראשי', desc: '', fields: [] }],
    audience: { types: ['public'], projectIds: [], orgIds: [], facilitatorIds: [] },
    respondentType: 'participant',
    isActive: true,
    isTemplate: false,
    gameMode: false,
    anonymous: false,
    isPulse: false,
    pulseTimepoints: [],
    translations: {},
    logos: [],
    created: new Date().toISOString(),
  });
  const [activeTab, setActiveTab] = useState('fields');
  const [showIconPicker, setShowIconPicker] = useState(false);

  const applyTemplate = (tpl) => {
    const cloned = JSON.parse(JSON.stringify(tpl));
    // Re-assign IDs to new questionnaire
    setForm({
      ...form,
      title: tpl.title,
      icon: tpl.icon,
      description: tpl.desc || form.description,
      sections: (cloned.sections || [{ id: uuid('sec'), name: 'סעיף ראשי', desc: '', fields: [] }]).map(s => ({
        ...s,
        id: uuid('sec'),
        fields: (s.fields || []).map(f => ({ ...f, id: uuid('f') })),
      })),
      gameMode: !!cloned.gameMode,
      isPulse: !!cloned.pulse?.enabled,
      pulseTimepoints: cloned.pulse?.timepoints || [],
    });
    setStep('build');
  };

  const startBlank = () => {
    setForm({ ...form, title: '', sections: [{ id: uuid('sec'), name: 'סעיף ראשי', desc: '', fields: [] }] });
    setStep('build');
  };

  const handleSave = () => {
    if (!form.title || !form.title.trim()) {
      onToast('יש להזין כותרת לשאלון', 'warn'); return;
    }
    onSave(form);
  };

  // Step 1: template gallery
  if (step === 'template') {
    return (
      <>
        <div className="flex items-center justify-between p-5 border-b border-[var(--ink)]/10 bg-gradient-to-l from-[var(--paper-warm)] to-[var(--paper)]">
          <div>
            <h2 className="font-display text-2xl font-bold">בונה השאלונים</h2>
            <p className="text-sm text-[var(--ink-mute)] mt-1">בחר נקודת התחלה — תבנית מוכנה או דף ריק</p>
          </div>
          <IconBtn icon="✕" onClick={onClose} title="סגור" />
        </div>
        <div className="flex-1 overflow-y-auto p-6">
          <div className="mb-5">
            <Field label="שפת מקור" hint="השפה שבה ייכתבו השאלות. תרגומים יבוצעו ממנה.">
              <div className="flex gap-2 flex-wrap">
                {LANGUAGES.map(l => (
                  <button key={l.code} onClick={() => setForm({ ...form, sourceLang: l.code })}
                          className={`px-3 py-2 rounded-lg border text-sm font-medium transition flex items-center gap-2
                            ${form.sourceLang === l.code
                              ? 'bg-white border-[var(--gold)] shadow-sm'
                              : 'bg-[var(--paper-warm)] border-transparent hover:border-[var(--ink)]/10'}`}>
                    <span className="text-lg">{l.flag}</span>{l.name}
                  </button>
                ))}
              </div>
            </Field>
          </div>

          {BUILTIN_TEMPLATES.length > 0 && (
            <>
              <Ornament>תבניות מוכנות ({BUILTIN_TEMPLATES.length})</Ornament>
              <div className="grid grid-cols-3 gap-3 mb-6">
                {BUILTIN_TEMPLATES.filter(t => t.id !== 'tpl_blank').map(t => (
                  <div key={t.id} className="tpl-card" onClick={() => applyTemplate(t)}>
                    <div className="flex items-start gap-3">
                      <span className="text-3xl">{t.icon}</span>
                      <div className="flex-1 min-w-0">
                        <div className="font-display font-bold text-base text-[var(--ink)]">{t.title}</div>
                        <div className="text-xs text-[var(--ink-mute)] mt-1 leading-snug">{t.desc}</div>
                        <div className="text-[10px] text-[var(--gold-deep)] mt-2 font-medium">
                          {(t.sections || []).reduce((s, sec) => s + (sec.fields || []).length, 0)} שדות
                          {(t.sections || []).length > 1 && ` · ${t.sections.length} סעיפים`}
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>

function TranslationEditor({ form, setForm, onToast }) {
  const otherLangs = LANGUAGES.filter(l => l.code !== form.sourceLang);
  const [activeLang, setActiveLang] = useState(otherLangs[0]?.code || 'en');
  const [translating, setTranslating] = useState(false);
  const [progress, setProgress] = useState({ done: 0, total: 0, label: '' });
  const cancelRef = useRef(false);
  const tr = (form.translations || {})[activeLang] || {};

  const updateTranslation = (patch) => {
    const next = { ...(form.translations || {}), [activeLang]: { ...((form.translations || {})[activeLang] || {}), ...patch } };
    setForm({ ...form, translations: next });
  };
  const updateFieldTr = (fieldId, value) => {
    const cur = (form.translations || {})[activeLang] || {};
    const fields = { ...(cur.fields || {}), [fieldId]: value };
    updateTranslation({ fields });
  };

  // Translate one string via MyMemory's free endpoint — no API key, CORS-enabled.
  // Free tier: ~5000 chars/day per IP. Strings >500 chars are chunked at sentence boundaries.
  const translateOne = async (text, src, tgt) => {
    if (!text || !text.trim()) return '';
    const chunks = [];
    if (text.length <= 480) chunks.push(text);
    else {
      // Split by punctuation while keeping sentences intact
      const parts = text.split(/([.!?؟।。\n]+\s*)/);
      let buf = '';
      for (const p of parts) {
        if ((buf + p).length > 480 && buf) { chunks.push(buf); buf = p; }
        else buf += p;
      }
      if (buf) chunks.push(buf);
    }
    const out = [];
    for (const chunk of chunks) {
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(chunk)}&langpair=${src}|${tgt}`;
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      if (data.responseStatus !== 200 && data.responseStatus !== '200') {
        throw new Error(data.responseDetails || data.responseStatus || 'translation failed');
      }
      out.push((data.responseData?.translatedText || '').trim());
    }
    return out.join(' ');
  };

  const autoTranslate = async () => {
    if (translating) return;
    cancelRef.current = false;
    const src = form.sourceLang || 'he';
    const tgt = activeLang;
    if (src === tgt) { onToast('שפת היעד זהה לשפת המקור', 'warn'); return; }

    // Collect everything to translate
    const allFields = (form.sections || []).flatMap(s => s.fields || []);
    const jobs = [];
    if (form.title) jobs.push({ key: 'title', label: 'כותרת השאלון', text: form.title });
    if (form.description) jobs.push({ key: 'description', label: 'תיאור השאלון', text: form.description });
    (form.sections || []).forEach(sec => {
      if (sec.name) jobs.push({ key: `section:${sec.id}`, label: `סעיף: ${sec.name.slice(0,30)}`, text: sec.name });
      if (sec.desc) jobs.push({ key: `sectionDesc:${sec.id}`, label: `תיאור סעיף: ${(sec.name || sec.desc).slice(0,25)}`, text: sec.desc });
    });
    allFields.forEach(f => {
      if (f.label) jobs.push({ key: `field:${f.id}`, label: f.label.slice(0, 40), text: f.label });
    });

    if (jobs.length === 0) { onToast('אין טקסטים לתרגם', 'warn'); return; }

    setTranslating(true);
    setProgress({ done: 0, total: jobs.length, label: '' });

    const newTr = { ...((form.translations || {})[tgt] || {}) };
    newTr.fields = { ...(newTr.fields || {}) };

    let failures = 0;
    for (let i = 0; i < jobs.length; i++) {
      if (cancelRef.current) break;
      const job = jobs[i];
      setProgress({ done: i, total: jobs.length, label: job.label });
      try {
        const translated = await translateOne(job.text, src, tgt);
        if (job.key === 'title')         newTr.title = translated;
        else if (job.key === 'description') newTr.description = translated;
        else if (job.key.startsWith('section:')) {
          newTr.sections = { ...(newTr.sections || {}), [job.key.slice(8)]: translated };
        }
        else if (job.key.startsWith('sectionDesc:')) {
          newTr.sectionDescs = { ...(newTr.sectionDescs || {}), [job.key.slice(12)]: translated };
        }
        else if (job.key.startsWith('field:')) newTr.fields[job.key.slice(6)] = translated;
        // Save incrementally so progress isn't lost on error
        setForm(prev => ({ ...prev, translations: { ...(prev.translations || {}), [tgt]: { ...newTr } } }));
      } catch (e) {
        failures++;
        console.warn('Translation failed for', job.label, e);
      }
      // Polite throttle so we don't trip the free-tier rate limit
      await new Promise(r => setTimeout(r, 220));
    }

    setProgress({ done: jobs.length, total: jobs.length, label: '' });
    setTranslating(false);
    if (cancelRef.current) onToast('התרגום בוטל', 'warn');
    else if (failures === 0) onToast(`תרגום ל-${LANGUAGES.find(l => l.code === tgt)?.name} הושלם בהצלחה`, 'success');
    else if (failures < jobs.length) onToast(`תרגום הושלם — ${failures} פריטים נכשלו (ייתכן שהגעת למכסה היומית של 5000 תווים)`, 'warn');
    else onToast('כשל בתרגום. בדקי חיבור לאינטרנט או מכסה יומית.', 'error');
  };

  const cancelTranslate = () => { cancelRef.current = true; };

  const allFields = (form.sections || []).flatMap(s => s.fields || []);
  return (
    <div className="max-w-4xl">
      <h3 className="font-display text-xl font-bold mb-2">תרגום השאלון</h3>
      <p className="text-sm text-[var(--ink-mute)] mb-5">תרגמי את השאלון לשפות נוספות. תרגומים נשמרים בנפרד ולא משנים את שפת המקור.</p>

      <div className="flex gap-2 flex-wrap mb-5">
        {otherLangs.map(l => (
          <button key={l.code} onClick={() => setActiveLang(l.code)}
                  className={`px-3 py-2 rounded-lg border text-sm font-medium transition flex items-center gap-2
                    ${activeLang === l.code ? 'bg-white border-[var(--pink)] shadow-sm' : 'bg-[var(--paper-warm)]/40 border-transparent hover:border-[var(--ink)]/10'}`}>
            <span className="text-lg">{l.flag}</span>{l.name}
            {(form.translations || {})[l.code] ? <span className="text-[var(--turq)]">✓</span> : <span className="text-[var(--ink-mute)]">—</span>}
          </button>
        ))}
      </div>

      <div className="banner-info mb-3 flex items-start justify-between gap-3">
        <div className="text-sm">
          <div>בחרת לתרגם ל-{LANGUAGES.find(l => l.code === activeLang)?.name}. אפשר לערוך כל שדה ידנית גם אחרי תרגום אוטומטי.</div>
          <div className="text-xs text-[var(--ink-mute)] mt-1">
            תרגום אוטומטי משתמש בשירות MyMemory החינמי (עד 5,000 תווים ביום לכתובת IP).
            איכות סבירה — כדאי לעבור לתיקון ידני אחר כך, במיוחד למונחים מקצועיים.
          </div>
        </div>
        {!translating ? (
          <Btn variant="gold" size="sm" icon="🌐" onClick={autoTranslate}>תרגמי אוטומטית</Btn>
        ) : (
          <Btn variant="danger" size="sm" onClick={cancelTranslate}>עצור תרגום</Btn>
        )}
      </div>

      {translating && (
        <div className="card-flat p-3 mb-4">
          <div className="flex items-center justify-between text-sm mb-2">
            <div className="font-medium">מתרגם — {progress.done} מתוך {progress.total}</div>
            <div className="text-xs text-[var(--ink-mute)] mono">{Math.round((progress.done / Math.max(progress.total, 1)) * 100)}%</div>
          </div>
          <div className="h-2 rounded-full bg-[var(--ink)]/8 overflow-hidden mb-2">
            <div className="h-full bg-gradient-to-l from-[var(--pink)] to-[var(--turq)]"
                 style={{ width: `${(progress.done / Math.max(progress.total, 1)) * 100}%`, transition: 'width 240ms' }} />
          </div>
          {progress.label && <div className="text-xs text-[var(--ink-mute)] truncate">▸ {progress.label}</div>}
        </div>
      )}

      <div className="space-y-3">
        <Field label="כותרת השאלון בשפה זו">
          <input className="input" value={tr.title || ''} placeholder={form.title}
                 dir={LANGUAGES.find(l => l.code === activeLang)?.dir || 'ltr'}
                 onChange={e => updateTranslation({ title: e.target.value })} />
        </Field>
        <Field label="תיאור / הוראות בשפה זו">
          <textarea className="textarea" rows="2" value={tr.description || ''} placeholder={form.description}
                    dir={LANGUAGES.find(l => l.code === activeLang)?.dir || 'ltr'}
                    onChange={e => updateTranslation({ description: e.target.value })} />
        </Field>

        <Ornament>תרגום שמות הסעיפים</Ornament>
        {(form.sections || []).map(sec => (
          <div key={sec.id} className="card-flat p-3">
            <div className="text-xs text-[var(--ink-mute)] mb-1">שם סעיף מקור:</div>
            <div className="text-sm font-medium mb-2">{sec.name || '(ללא שם)'}</div>
            <input className="input" value={((tr.sections || {})[sec.id]) || ''} placeholder={sec.name || 'הזיני תרגום…'}
                   dir={LANGUAGES.find(l => l.code === activeLang)?.dir || 'ltr'}
                   onChange={e => {
                     const curSections = { ...((form.translations || {})[activeLang]?.sections || {}), [sec.id]: e.target.value };
                     updateTranslation({ sections: curSections });
                   }} />
            {sec.desc && (<>
              <div className="text-xs text-[var(--ink-mute)] mb-1 mt-3">תיאור סעיף מקור:</div>
              <div className="text-sm mb-2 text-[var(--ink-mute)]">{sec.desc}</div>
              <textarea className="textarea" rows="2" value={((tr.sectionDescs || {})[sec.id]) || ''} placeholder="הזיני תרגום לתיאור הסעיף…"
                     dir={LANGUAGES.find(l => l.code === activeLang)?.dir || 'ltr'}
                     onChange={e => {
                       const curDescs = { ...((form.translations || {})[activeLang]?.sectionDescs || {}), [sec.id]: e.target.value };
                       updateTranslation({ sectionDescs: curDescs });
                     }} />
            </>)}
          </div>
        ))}

        <Ornament>תרגום השדות</Ornament>
        {allFields.length === 0 && <div className="text-sm text-[var(--ink-mute)] italic">אין שדות לתרגום</div>}
        {allFields.map(f => (
          <div key={f.id} className="card-flat p-3">
            <div className="text-xs text-[var(--ink-mute)] mb-1">תווית מקור:</div>
            <div className="text-sm font-medium mb-2">{f.label}</div>
            <input className="input" value={(tr.fields || {})[f.id] || ''} placeholder="הקלידי תרגום או הפעילי תרגום אוטומטי…"
                   dir={LANGUAGES.find(l => l.code === activeLang)?.dir || 'ltr'}
                   onChange={e => updateFieldTr(f.id, e.target.value)} />
          </div>
        ))}
      </div>
    </div>
  );
}

function LogoManager({ logos = [], onChange }) {
  const inputRef = useRef(null);
  const [error, setError] = useState('');

  const MAX_LOGOS = 5;
  const MAX_FILE_SIZE = 600 * 1024; // 600KB per logo (base64 will be ~800KB in storage)

  const handleFiles = async (files) => {
    setError('');
    const arr = Array.from(files);
    if (logos.length + arr.length > MAX_LOGOS) {
      setError(`ניתן להוסיף עד ${MAX_LOGOS} לוגואים. כרגע ${logos.length}, ניסית להוסיף עוד ${arr.length}.`);
      return;
    }
    const newLogos = [];
    for (const file of arr) {
      if (!file.type.startsWith('image/')) {
        setError(`הקובץ "${file.name}" אינו תמונה.`); continue;
      }
      if (file.size > MAX_FILE_SIZE) {
        setError(`הקובץ "${file.name}" גדול מ-${Math.round(MAX_FILE_SIZE/1024)}KB. כדאי לדחוס לפני העלאה.`); continue;
      }
      try {
        const dataUrl = await new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = () => resolve(r.result);
          r.onerror = () => reject(new Error('read failed'));
          r.readAsDataURL(file);
        });
        newLogos.push({ id: uuid('logo'), name: file.name, dataUrl, size: file.size });
      } catch(e) {
        setError(`שגיאה בקריאת "${file.name}"`);
      }
    }
    if (newLogos.length) onChange([...logos, ...newLogos]);
    if (inputRef.current) inputRef.current.value = '';
  };

  const removeLogo = (id) => onChange(logos.filter(l => l.id !== id));
  const moveLogo = (idx, dir) => {
    const ni = idx + dir;
    if (ni < 0 || ni >= logos.length) return;
    const next = [...logos];
    [next[idx], next[ni]] = [next[ni], next[idx]];
    onChange(next);
  };

  return (
    <div className="card-flat p-4">
      <div className="flex items-start justify-between gap-3 mb-3">
        <div>
          <div className="font-display font-bold text-base mb-1">🎨 לוגואים של הארגון</div>
          <p className="text-xs text-[var(--ink-mute)] leading-relaxed">
            עד {MAX_LOGOS} לוגואים. יופיעו בגדול בכותרת השאלון, ובקטן בתחתיתו. סדר הצגה לפי הסדר שכאן.
            מומלצים קבצי PNG עם רקע שקוף, עד 600KB לקובץ.
          </p>
        </div>
        <Btn variant="soft" onClick={() => inputRef.current?.click()} disabled={logos.length >= MAX_LOGOS}>
          + הוסף לוגו
        </Btn>
        <input ref={inputRef} type="file" accept="image/*" multiple style={{display:'none'}}
               onChange={e => handleFiles(e.target.files)} />
      </div>

      {error && (
        <div className="banner-warn mb-3 text-xs">
          <div className="text-xl">⚠️</div>
          <div>{error}</div>
        </div>
      )}

      {logos.length === 0 ? (
        <div className="text-center py-6 text-[var(--ink-mute)] text-sm border-2 border-dashed border-[var(--ink)]/10 rounded-lg">
          אין עדיין לוגואים. הוסיפי לוגו ראשון כדי לבדוק את התצוגה.
        </div>
      ) : (
        <div className="space-y-2">
          {logos.map((logo, idx) => (
            <div key={logo.id} className="flex items-center gap-3 p-2 rounded-lg bg-white/60 border border-[var(--ink)]/8">
              <div className="w-20 h-14 rounded bg-[var(--paper-warm)] flex items-center justify-center overflow-hidden flex-shrink-0">
                <img src={logo.dataUrl} alt={logo.name} style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} />
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium truncate">{logo.name}</div>
                <div className="text-xs text-[var(--ink-mute)] mono">{Math.round(logo.size/1024)}KB · מיקום #{idx+1}</div>
              </div>
              <div className="flex items-center gap-1">
                <IconBtn icon="↑" title="הזז למעלה" onClick={() => moveLogo(idx, -1)} />
                <IconBtn icon="↓" title="הזז למטה" onClick={() => moveLogo(idx, 1)} />
                <IconBtn icon="🗑️" title="מחק" onClick={() => removeLogo(logo.id)} danger />
              </div>
            </div>
          ))}
        </div>
      )}

      {logos.length > 0 && (
        <div className="mt-4 pt-3 border-t border-[var(--ink)]/10">
          <div className="text-xs font-display tracking-wider uppercase text-[var(--ink-mute)] mb-2">תצוגה מקדימה — באנר עליון</div>
          <div className="flex items-center justify-center gap-4 flex-wrap p-3 rounded-lg bg-gradient-to-br from-[#fff2f8] via-[#f5e8fc] to-[#e6f4f6] border border-[var(--purple)]/10">
            {logos.map(l => <img key={l.id} src={l.dataUrl} alt={l.name} style={{ maxHeight: '60px', maxWidth: '140px', objectFit: 'contain' }} />)}
          </div>
          <div className="text-xs font-display tracking-wider uppercase text-[var(--ink-mute)] mb-2 mt-3">תצוגה מקדימה — כותרת תחתונה</div>
          <div className="flex items-center justify-center gap-3 flex-wrap p-2 rounded-lg bg-white/70 border border-[var(--ink)]/8">
            {logos.map(l => <img key={l.id} src={l.dataUrl} alt={l.name} style={{ maxHeight: '28px', maxWidth: '70px', objectFit: 'contain', opacity: 0.85 }} />)}
          </div>
        </div>
      )}
    </div>
  );
}
